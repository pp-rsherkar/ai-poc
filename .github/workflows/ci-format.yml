name: Format check

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  spotless:
    name: Spotless check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Spotless check
        # We don't want the whole job to stop immediately without our summary
        run: mvn -B -ntp spotless:check

      - name: Explain formatting changes to user
        # This step ONLY runs if the check step above fails
        if: failure()
        run: |
          # 1. Apply the fixes so we can capture the raw git diff
          mvn -B -ntp spotless:apply
          
          # 2. Write a friendly explanation to the GitHub UI
          echo "### 🎨 Formatting Issues Detected" >> $GITHUB_STEP_SUMMARY
          echo "Spotless found some files that don't quite match the repository's formatting standards. Don't worry, this is easy to fix!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "#### How to fix it 🛠️" >> $GITHUB_STEP_SUMMARY
          echo "Run this command locally in your terminal to automatically format your code, then commit and push:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "mvn spotless:apply" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "<details><summary><b>Click here to view the specific formatting changes</b></summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`diff" >> $GITHUB_STEP_SUMMARY
          git diff >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "</details>" >> $GITHUB_STEP_SUMMARY