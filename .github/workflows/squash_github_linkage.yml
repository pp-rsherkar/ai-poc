name: Search Squash Test Case

on:
  workflow_dispatch:
    inputs:
      search_value:
        description: "Enter Test Case ID or Keyword"
        required: true
        type: string

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install MCP Dependencies
        run: npm install tslib isomorphic-ws eventsource

      - name: Search Test Case via MCP
        env:
          SQUASH_URL: "https://sq-mcp.internetbrands.com/squashmcp"
          SQUASH_TOKEN: ${{ secrets.SQUASH_TOKEN }}
          SEARCH_VALUE: ${{ github.event.inputs.search_value }}
        run: |
          cat << 'EOF' > squash_mcp_client.js
          const EventSource = require('eventsource');

          const url = process.env.SQUASH_URL;
          const token = process.env.SQUASH_TOKEN;
          const searchValue = process.env.SEARCH_VALUE;

          const isNumeric = /^\d+$/.test(searchValue);
          
          // Construct arguments based on input type matching your working Postman payload schema
          const args = isNumeric 
            ? { case_id: parseInt(searchValue, 10), folder_id: 0, project_id: 0, semantic_query: "" }
            : { case_id: 0, folder_id: 0, project_id: 0, semantic_query: searchValue };

          // Fallbacks for filters matching your original Java template
          const structuralArgs = {
            ...args,
            name_keyword_filter: "",
            creator: "",
            status_list: "",
            weight_list: "",
            nature_list: "",
            type_list: "",
            test_category_list: "",
            exclude_test_category_list: "",
            automated: "any",
            page: 1
          };

          const payload = {
            jsonrpc: "2.0",
            id: 1,
            method: "tools/call",
            params: {
              name: "search-for-test-case",
              arguments: structuralArgs
            }
          };

          console.log(`Connecting to Squash MCP via SSE: ${url}`);
          
          // MCP over HTTP establishes an SSE stream connection for transport
          const es = new EventSource(url, {
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            }
          });

          es.onopen = async () => {
            console.log("Connected securely to Squash MCP stream.");
            
            // Postman manages the handshake background; here we transmit the tool execution payload
            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
              });

              console.log(`HTTP Post Status: ${response.status}`);
              const data = await response.json();
              console.log("================ MCP RESPONSE ================");
              console.log(JSON.stringify(data, null, 2));
              console.log("==============================================");
              
              es.close();
              process.exit(0);
            } catch (error) {
              console.error("Execution payload transmission failed:", error);
              es.close();
              process.exit(1);
            }
          };

          es.onerror = (err) => {
            console.error("MCP Stream Transport Error:", err);
            es.close();
            process.exit(1);
          };

          // Timeout fallback safety mechanism for the runner
          setTimeout(() => {
            console.error("Workflow Timeout: MCP server failed to respond within 15 seconds.");
            es.close();
            process.exit(1);
          }, 15000);
          EOF

          node squash_mcp_client.js
