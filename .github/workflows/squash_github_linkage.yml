name: Search Squash Test Case

on:
  workflow_dispatch:
    inputs:
      search_value:
        description: "Enter Test Case ID or Keyword"
        required: true
        type: string

jobs:
  search:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # =========================================================
      # STEP 1: INSTALL AND CONFIGURE OPENVPN
      # =========================================================
      - name: Install OpenVPN
        run: |
          sudo apt-get update
          sudo apt-get install -y openvpn openvpn-systemd-resolved

      - name: Connect to Corporate VPN
        env:
          VPN_CONFIG: ${{ secrets.VPN_CONFIGURATION }}
        run: |
          # Write the corporate VPN configuration profile to a local file
          echo "$VPN_CONFIG" > client.ovpn
          
          # Start OpenVPN in the background (--daemon)
          # We include systemd-resolved options to ensure corporate DNS routes correctly
          sudo openvpn --config client.ovpn --daemon vpn_tunnel
          
          # Wait up to 15 seconds for the virtual tunnel interface (tun0) to initialize and fetch an IP
          echo "Waiting for VPN connection to stabilize..."
          for i in {1..15}; do
            if ip addr show dev tun0 &> /dev/null; then
               echo "VPN Tunnel (tun0) established successfully!"
               break
            fi
            sleep 1
          done

      # =========================================================
      # STEP 2: NETWORK DIAGNOSTIC PRE-CHECK
      # =========================================================
      - name: Verify Corporate Network Routing
        run: |
          echo "Testing Internal DNS Resolution for Squash Gateway..."
          nslookup sq-mcp.internetbrands.com || echo "DNS lookup failed, attempting fallback..."
          
          echo "Testing direct network ping to the host..."
          ping -c 3 sq-mcp.internetbrands.com || echo "Ping failed (ICMP might be blocked, continuing workflow)..."

      # =========================================================
      # STEP 3: EXECUTE SQUASH MCP SEARCH VIA NODE.JS
      # =========================================================
      - name: Search Test Case via MCP
        env:
          SQUASH_URL: "https://sq-mcp.internetbrands.com/squashmcp"
          SQUASH_TOKEN: ${{ secrets.SQUASH_TOKEN }}
          SEARCH_VALUE: ${{ github.event.inputs.search_value }}
        run: |
          cat << 'EOF' > squash_mcp_client.js
          const url = process.env.SQUASH_URL;
          const token = process.env.SQUASH_TOKEN;
          const searchValue = process.env.SEARCH_VALUE;

          const isNumeric = /^\d+$/.test(searchValue);
          
          const structuralArgs = {
            case_id: isNumeric ? parseInt(searchValue, 10) : 0,
            folder_id: 0,
            project_id: 0,
            semantic_query: isNumeric ? "" : searchValue,
            name_keyword_filter: "",
            creator: "",
            status_list: "",
            weight_list: "",
            nature_list: "",
            type_list: "",
            test_category_list: "",
            exclude_test_category_list: "",
            automated: "any",
            page: 1
          };

          const payload = {
            jsonrpc: "2.0",
            id: 1,
            method: "tools/call",
            params: {
              name: "search-for-test-case",
              arguments: structuralArgs
            }
          };

          async function run() {
            console.log(`Sending HTTP POST to Squash MCP Gateway: ${url}`);
            try {
              const response = await fetch(url, {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${token}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
              });

              console.log(`HTTP Status: ${response.status} ${response.statusText}`);
              
              const text = await response.text();
              console.log("================ MCP RESPONSE ================");
              try {
                console.log(JSON.stringify(JSON.parse(text), null, 2));
              } catch {
                console.log(text);
              }
              console.log("==============================================");

              if (!response.ok) {
                process.exit(1);
              }
            } catch (error) {
              console.error("Network or execution payload error:", error);
              process.exit(1);
            }
          }

          run();
          EOF

          node squash_mcp_client.js
