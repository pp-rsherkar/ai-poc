name: Search Squash Test Case (Cloud via FortiClient)

on:
  workflow_dispatch:
    inputs:
      search_value:
        description: "Enter Test Case ID or Keyword"
        required: true
        type: string

jobs:
  search:
    # Runs entirely in GitHub's cloud, your laptop can be completely off!
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # =========================================================
      # STEP 1: CONSTRUCT AND OPERATE THE SSL-VPN TUNNEL
      # =========================================================
      - name: Connect to FortiClient VPN
        env:
          VPN_HOST: ${{ secrets.VPN_GATEWAY }}
          VPN_PORT: ${{ secrets.VPN_PORT }}
          VPN_USER: ${{ secrets.VPN_USERNAME }}
          VPN_PASS: ${{ secrets.VPN_PASSWORD }}
        run: |
          sudo apt-get update
          sudo apt-get install -y openfortivpn
          
          # Writing config file dynamically
          # trusted-cert is added to pass your company's SSL gateway verification smoothly
          cat <<EOF > vpn.conf
          host = $VPN_HOST
          port = $VPN_PORT
          username = $VPN_USER
          password = $VPN_PASS
          set-dns = 1
          pppd-use-peerdns = 1
          trusted-cert = allow-all
          EOF
          
          echo "Starting OpenFortiVPN background tunnel..."
          sudo openfortivpn -c vpn.conf &
          
          # Give the tunnel handshake 15 seconds to fully complete and pass traffic
          sleep 15
          
          echo "Verifying network interface routing status:"
          ifconfig | grep -A 6 ppp || echo "Tunnel initialization ongoing..."

      # =========================================================
      # STEP 2: RUN THE SQUASH SEARCH IN THE ACTIVE TUNNEL
      # =========================================================
      - name: Search Test Case via MCP
        env:
          SQUASH_URL: "https://sq-mcp.internetbrands.com/squashmcp"
          SQUASH_TOKEN: ${{ secrets.SQUASH_TOKEN }}
          SEARCH_VALUE: ${{ github.event.inputs.search_value }}
        run: node squash_mcp_client.js
