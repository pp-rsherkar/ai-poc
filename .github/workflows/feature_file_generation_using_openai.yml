name: JIRA - Feature File (GHERKIN) Generator Using OPENAI

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., QA-1321)"
        required: true
        type: string
      domain:
        description: "Target domain/sub-folder"
        required: true                        # make it required
        type: choice
        default: "life"
        options:
          - life
          - studio
          - hcp
      llm_model:
        description: "Select LLM Model"
        required: true
        type: choice
        default: "openai/gpt-4.1"
        options:
          - openai/gpt-4.1
          - openai/gpt-4.1-mini
          - openai/gpt-4.1-nano
          - openai/gpt-4o
          - openai/gpt-4o-mini
          - openai/gpt-5
          - openai/gpt-5-chat
          - openai/gpt-5-mini
          - openai/gpt-5-nano
          - openai/o1
          - openai/o1-mini
          - openai/o1-preview
          - openai/o3
          - openai/o3-mini
          - openai/o4-mini
          - cohere/cohere-command-a
          - deepseek/deepseek-r1
          - deepseek/deepseek-r1-0528
          - deepseek/deepseek-v3-0324
          - meta/llama-3.2-11b-vision-instruct
          - meta/llama-3.2-90b-vision-instruct
          - meta/llama-3.3-70b-instruct
          - meta/llama-4-maverick-17b-128e-instruct-fp8
          - meta/llama-4-scout-17b-16e-instruct
          - meta/meta-llama-3.1-405b-instruct
          - meta/meta-llama-3.1-8b-instruct
          - mistral-ai/codestral-2501
          - mistral-ai/ministral-3b
          - mistral-ai/mistral-medium-2505
          - mistral-ai/mistral-small-2503
          - microsoft/phi-4
          - microsoft/phi-4-mini-instruct
          - microsoft/phi-4-mini-reasoning
          - microsoft/phi-4-multimodal-instruct
          - microsoft/phi-4-reasoning

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    env:
      FEATURE_DIR: src/test/resources/features

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # Build reusable step dictionary
      # Scans all .feature files and groups steps + scenario
      # titles by sub-folder domain for targeted context injection.
      # =========================
      - name: Build AI repository context
        run: |
          set -euo pipefail

          mkdir -p "$FEATURE_DIR"
          
          python3 << 'PYEOF'
          import os, glob, re
          from collections import defaultdict
          
          feature_dir = os.environ.get("FEATURE_DIR", "src/test/resources/features")
          
          steps_by_domain = defaultdict(set)
          scenarios = []
          
          for file_path in glob.glob(f"{feature_dir}/**/*.feature", recursive=True):
              domain = os.path.basename(os.path.dirname(file_path))
              if domain == "features" or domain == "":
                  domain = "general"
                  
              with open(file_path, 'r', encoding='utf-8') as f:
                  content = f.read()
                  
                  # Extract scenarios
                  for match in re.finditer(r'^\s*(Scenario|Scenario Outline):\s*(.+)', content, re.MULTILINE):
                      scenarios.append(f"[{domain}] {match.group(0).strip()}")
                  
                  # Extract steps
                  for line in content.split('\n'):
                      line = line.strip()
                      if re.match(r'^(Given|When|Then|And|But)\s+', line):
                          steps_by_domain[domain].add(line)
          
          # Write step dictionary
          with open('step_dictionary.txt', 'w', encoding='utf-8') as f:
              for domain, steps in sorted(steps_by_domain.items()):
                  f.write(f"\n--- Domain: {domain} ---\n")
                  f.write('\n'.join(sorted(steps)))
                  f.write('\n')
                  
          # Write scenario dictionary
          with open('scenario_dictionary.txt', 'w', encoding='utf-8') as f:
              f.write('\n'.join(scenarios))
          PYEOF

          echo "Reusable step count:"
          wc -l step_dictionary.txt 2>/dev/null || echo "0 step_dictionary.txt"
          echo "Scenario count:"
          wc -l scenario_dictionary.txt 2>/dev/null || echo "0 scenario_dictionary.txt"

      # =========================
      # Create working branch
      # =========================
      - name: Create branch
        run: |
          set -euo pipefail
          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin
          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      # =========================
      # Fetch Jira details
      # =========================
      - name: Fetch Jira details
        run: |
          set -euo pipefail

          RESPONSE=$(curl -s --fail \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          echo "$RESPONSE" > jira_response.json

          if echo "$RESPONSE" | jq -e '.errorMessages' >/dev/null; then
            echo "Jira API returned an error:"
            cat jira_response.json
            exit 1
          fi

          SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary // "No Summary"')
          DESCRIPTION=$(echo "$RESPONSE" | jq -r '.fields.description | .. | .text? // empty' \
            | tr "\n" " " | sed 's/[[:space:]]\+/ /g')
          COMMENTS=$(echo "$RESPONSE" | jq -r \
            '.fields.comment.comments | sort_by(.created) | .[] | (.author.displayName // "Unknown") + ": " + (.body | .. | .text? // empty)' \
            | tr "\n" " " | sed 's/[[:space:]]\+/ /g')

          [ -z "$DESCRIPTION" ] && DESCRIPTION="No Description"
          [ -z "$COMMENTS" ]    && COMMENTS="No Comments"

          DESC_LEN=${#DESCRIPTION}
          COMM_LEN=${#COMMENTS}

          if [ "$DESC_LEN" -gt 12000 ]; then
            echo "WARNING: Description is ${DESC_LEN} chars — exceeds 12000, will be truncated. Consider splitting the ticket."
          fi
          if [ "$COMM_LEN" -gt 8000 ]; then
            echo "WARNING: Comments are ${COMM_LEN} chars — exceeds 8000, will be truncated."
          fi

          DESCRIPTION=$(echo "$DESCRIPTION" | cut -c1-12000)
          COMMENTS=$(echo "$COMMENTS" | cut -c1-8000)

          {
            echo "SUMMARY<<EOF"
            echo "$SUMMARY"
            echo "EOF"
            echo "DESCRIPTION<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"
            echo "COMMENTS<<EOF"
            echo "$COMMENTS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # =========================
      # List Available Models
      # =========================
      - name: List available models
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS \
           https://models.github.ai/catalog/models \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json")
          echo "$RESPONSE" | jq -r 'if type=="object" and (.data|type=="array") then .data[].id elif type=="array" then .[].id else empty end'

      # =========================
      # Write prompt file
      # Uses Python to write prompt.txt so there is zero indentation
      # bloat regardless of YAML nesting depth — heredocs inside
      # indented run blocks inherit leading spaces which inflate tokens.
      # =========================
      - name: Write prompt file
        env:
          SUMMARY: ${{ env.SUMMARY }}
          DESCRIPTION: ${{ env.DESCRIPTION }}
          COMMENTS: ${{ env.COMMENTS }}
          JIRA_ID: ${{ inputs.jira_id }}
          DOMAIN: ${{ inputs.domain }}
        run: |
          set -euo pipefail

          # Validate Domain Input
          if [ -n "$DOMAIN" ]; then
            if [ ! -d "$FEATURE_DIR/$DOMAIN" ]; then
              echo "::error::Domain '$DOMAIN' does not exist in $FEATURE_DIR. Please check for typos."
              echo "Available domains: $(ls "$FEATURE_DIR")"
              exit 1
            fi
          fi

          # Pick domain-specific feature examples if a domain is provided
          if [ -n "$DOMAIN" ]; then
            FEATURE_EXAMPLES=$(
              find "$FEATURE_DIR/$DOMAIN" -name "*.feature" \
              | sort \
              | head -2 \
              | xargs cat 2>/dev/null \
              | head -n 40 \
              || true
            )
          else
            FEATURE_EXAMPLES=$(
              find "$FEATURE_DIR" -name "*.feature" \
              | sort \
              | head -2 \
              | xargs cat 2>/dev/null \
              | head -n 40 \
              || true
            )
          fi

          # Export so Python can read them
          export FEATURE_EXAMPLES

          python3 << 'PYEOF'
          import os, re
          
          domain           = os.environ.get("DOMAIN", "")
          domain_text      = domain if domain else "general"
          
          # ── Step context: target domain only ────────────────────────────────
          steps = []  # always initialise BEFORE the file check
          if os.path.exists("step_dictionary.txt"):
              with open("step_dictionary.txt", "r", encoding="utf-8") as f:
                  content = f.read()
          # Change this part under "Step context: target domain only"
          blocks = re.split(r'\n--- Domain: (.*?) ---\n', content)
          for i in range(1, len(blocks), 2):  # <-- Removed the '- 1'
              d = blocks[i]
              s = blocks[i + 1]
              if d == domain_text:
                  steps.append(f"--- {d} steps ---\n{s.strip()}")

          # ── Cap per domain block — not total ────────────────────────────────
          MAX_LINES_PER_DOMAIN = 120
          capped_steps = []
          for block in steps:
              block_lines = block.split('\n')
              if len(block_lines) > MAX_LINES_PER_DOMAIN:
                  block_lines = block_lines[:MAX_LINES_PER_DOMAIN]
                  print(f"::warning::Step block trimmed to {MAX_LINES_PER_DOMAIN} lines to fit token budget")
              capped_steps.append('\n'.join(block_lines))
          step_context = "\n\n".join(capped_steps)

          # ── Guard: warn loudly if step context is empty ──────────────────────
          if not step_context.strip():
              print(f"::warning::No steps found for domain '{domain_text}' in step_dictionary.txt — model will invent all steps")
          else:
              print(f"Step context: {len(step_context.splitlines())} lines for domain '{domain_text}'")  

          scenario_context = ""
          if os.path.exists("scenario_dictionary.txt"):
              with open("scenario_dictionary.txt", "r", encoding="utf-8") as f:
                  lines = f.readlines()
                  scenarios = []
                  for line in lines:
                      if line.startswith(f"[{domain_text}]"):
                          scenarios.append(line.strip())
                  # Cap to 30 titles — enough to avoid duplicates
                  scenario_context = "\n".join(scenarios[-30:])
          
          feature_examples = os.environ.get("FEATURE_EXAMPLES", "")
          summary_trim     = os.environ.get("SUMMARY", "")[:300]
          desc_trim        = os.environ.get("DESCRIPTION", "")
          comments_trim    = os.environ.get("COMMENTS", "")[:1000]
          jira_id          = os.environ.get("JIRA_ID", "")
          
          prompt = f"""HARD RULES:
          1. Return ONLY raw valid Gherkin. No markdown, no code fences, no explanations.
          2. Every Scenario/Scenario Outline must have exactly one @todo tag on its own line above it.
          3. NEVER place @todo on the same line as Scenario. NEVER emit two @todo tags before one Scenario.
          4. You are STRICTLY FORBIDDEN from inventing new steps unless absolutely necessary. Every step MUST be selected from the provided domain STEP DICTIONARY if a functional equivalent exists. If you must invent a new step, mark it with a comment: # NEW STEP
          5. Never use placeholder steps. Write the full meaningful step text always.
          6. Never use angle bracket tokens like <NAME> unless they are Scenario Outline parameters defined in an Examples table.
          
          DECISION RULES:
          - Use plain Scenario by default.
          - Use Scenario Outline + Examples ONLY when: same steps apply to 2+ distinct combos explicit in the ticket AND Examples has 2+ rows.
          - Use a data table when a step needs 3+ key-value pairs or a list. Not for 1-2 values.
          
          Data table example:
            When I submit the form with:
              | field | value |
              | email | a@b.c |
              | role  | admin |
          
          DESCRIPTION INTERPRETATION RULES:
          The Jira description may be written in different styles. Handle all of them:
          
          Style 1 - Explicit acceptance criteria: Interpret directly and write scenarios.
          Style 2 - Scope list (e.g. "FE: Dropdown Changes, Brand Multi Select"):
            For each item infer the most likely user-facing behaviour and write a scenario.
            Ask: what would a QA engineer test for this item?
            Example: "Brand Multi Select" means user selects multiple brands and verifies they are applied.
          Style 3 - Status notes (e.g. "6/9 - RELEASED"): Ignore pure status lines.
          Style 4 - Mixed: Process each section independently. UPDATED section is high priority.
          
          For ANY description style:
          - Every bullet, numbered item, or named feature in SCOPE must produce at least one scenario.
          - Every UPDATED section item must produce at least one scenario.
          - Never skip a scope item because it lacks explicit ACs. Infer the behaviour from the item name.
          - Use COMMENTS for additional context and edge cases.
          
          SCENARIO GENERATION:
          1. Read the full DESCRIPTION and COMMENTS.
          2. Identify every functional scope item regardless of description style.
          3. For each item write scenarios covering:
             - Happy path (feature works as expected)
             - Negative/validation (only if inferable from context)
             - Permission/role (only if roles are mentioned)
          4. Steps in Given/When/Then/And/But order.
          5. Business-readable language. No technical implementation details.
          6. One behaviour per scenario. No duplicates.
          7. Invented steps must be full meaningful text, never a placeholder.
          
          JIRA:
          ID: {jira_id}
          TARGET DOMAIN: {domain_text}
          SUMMARY: {summary_trim}
          DESCRIPTION: {desc_trim}
          COMMENTS: {comments_trim}
          
          REPOSITORY EXAMPLES:
          {feature_examples}
          
          EXISTING SCENARIOS (Domain-aware):
          {scenario_context}
          
          STEP DICTIONARY:
          {step_context}
          
          OUTPUT FORMAT:
          Feature: <name from Jira summary>
          
            @todo
            Scenario: <title>
              Given ...
              When ...
              Then ...
          
            @todo
            Scenario Outline: <title>
              Given ...
              When ... "<param>"
              Then ...
              Examples:
                | param  |
                | value1 |
                | value2 |
          """
          
          with open("prompt.txt", "w") as f:
              f.write(prompt)
          
          size  = os.path.getsize("prompt.txt")
          words = len(prompt.split())
          print(f"Prompt size: {size} bytes / {words} words (est. {words // 3} tokens)")
          PYEOF

      # =========================
      # Generate Feature File
      # =========================
      - name: Generate feature via OpenAI
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          echo "Preparing to generate feature file..."

          MODEL="${{ inputs.llm_model }}"

          if echo "$MODEL" | grep -Eq "^openai/(o[0-9]|gpt-5)"; then
            TOKEN_PARAM="max_completion_tokens"
          else
            TOKEN_PARAM="max_tokens"
          fi

          echo "Model: $MODEL | Token param: $TOKEN_PARAM"

          if [ "$TOKEN_PARAM" = "max_completion_tokens" ]; then
            jq -n \
              --arg model "$MODEL" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                temperature: 0,
                max_completion_tokens: 8192,
                messages: [
                  {
                    role: "system",
                    content: "You are a senior QA automation engineer. Output raw valid Gherkin only — no markdown, no fences, no commentary."
                  },
                  {
                    role: "user",
                    content: $prompt
                  }
                ]
              }' > request.json
          else
            jq -n \
              --arg model "$MODEL" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                temperature: 0,
                max_tokens: 8192,
                messages: [
                  {
                    role: "system",
                    content: "You are a senior QA automation engineer. Output raw valid Gherkin only — no markdown, no fences, no commentary."
                  },
                  {
                    role: "user",
                    content: $prompt
                  }
                ]
              }' > request.json
          fi

          echo "Request size: $(wc -c < request.json) bytes"
          # ── Debug: size breakdown before sending ───────────────
          PROMPT_CHARS=$(jq -r '.messages[1].content' request.json | wc -c)
          SYSTEM_CHARS=$(jq -r '.messages[0].content' request.json | wc -c)
          TOTAL_BYTES=$(wc -c < request.json)
          echo "System prompt : $SYSTEM_CHARS chars (~$(( SYSTEM_CHARS / 4 )) tokens)"
          echo "User prompt   : $PROMPT_CHARS chars (~$(( PROMPT_CHARS / 4 )) tokens)"
          echo "Total request : $TOTAL_BYTES bytes (~$(( TOTAL_BYTES / 4 )) tokens)"
          echo "--- User prompt content ---"
          jq -r '.messages[1].content' request.json
          # ──────────────────────────────────────────────────────

          echo "Generating feature file..."

          HTTP_RESPONSE=$(mktemp)

          HTTP_CODE=$(curl -s -o "$HTTP_RESPONSE" -w "%{http_code}" \
            https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data @request.json)

          echo "HTTP Status: $HTTP_CODE"
          cat "$HTTP_RESPONSE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Model API request failed"
            exit 1
          fi

          RESPONSE=$(cat "$HTTP_RESPONSE")
          echo "$RESPONSE" > model_response.json

          FEATURE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          FEATURE=$(echo "$FEATURE" | sed 's/```gherkin//g' | sed 's/```//g')

          if [ -z "$FEATURE" ]; then
            echo "Model returned empty output"
            cat model_response.json
            exit 1
          fi

          if ! echo "$FEATURE" | grep -q "^Feature:"; then
            echo "Invalid Gherkin generated"
            echo "$FEATURE"
            exit 1
          fi

          if ! echo "$FEATURE" | grep -Eq "Scenario:|Scenario Outline:"; then
            echo "No scenarios generated"
            echo "$FEATURE"
            exit 1
          fi

          echo "$FEATURE" > generated.feature
          echo "Feature file generated successfully"

      # =========================
      # Save feature file
      # =========================
      - name: Save feature file
        env:
          DOMAIN: ${{ inputs.domain }}
        run: |
          set -euo pipefail
          FILE="${{ inputs.jira_id }}.feature"
          
          if [ -n "$DOMAIN" ]; then
            TARGET_DIR="$FEATURE_DIR/$DOMAIN"
          else
            TARGET_DIR="$FEATURE_DIR"
          fi
          
          mkdir -p "$TARGET_DIR"
          cp generated.feature "$TARGET_DIR/$FILE"

          if [ ! -s "$TARGET_DIR/$FILE" ]; then
            echo "Generated feature file is empty"
            exit 1
          fi

          if ! grep -q "^Feature:" "$TARGET_DIR/$FILE"; then
            echo "Saved file missing Feature: declaration"
            exit 1
          fi
          
          if [ -n "$DOMAIN" ]; then
            echo "FILE=$DOMAIN/$FILE" >> "$GITHUB_ENV"
          else
            echo "FILE=$FILE" >> "$GITHUB_ENV"
          fi

      # =========================
      # Validate Output
      # =========================
      - name: Validate Output
        env:
          DOMAIN: ${{ inputs.domain }}
        run: |
          set -euo pipefail
          echo "Verifying step reuse and rules..."
          
          DOMAIN_TEXT=${DOMAIN:-general}
          
          # Ensure @todo tags are present
          SCENARIO_COUNT=$(grep -cE '^\s*(Scenario|Scenario Outline):' generated.feature || echo 0)
          TODO_COUNT=$(grep -c '^\s*@todo' generated.feature || echo 0)
          
          if [ "$SCENARIO_COUNT" -ne "$TODO_COUNT" ]; then
            echo "::error::Validation failed: Number of @todo tags ($TODO_COUNT) does not match number of scenarios ($SCENARIO_COUNT)."
            exit 1
          fi
          
          # Extract all steps from the generated feature
          grep -E '^\s*(Given|When|Then|And|But)\s+' generated.feature | sed -E 's/^\s+//' > generated_steps.txt || true
          
          # Extract domain and general existing steps from dictionary
          python3 << 'PYEOF'
          import os, re
          domain = os.environ.get("DOMAIN", "")
          domain_text = domain if domain else "general"
          steps = set()
          if os.path.exists("step_dictionary.txt"):
              with open("step_dictionary.txt", "r", encoding="utf-8") as f:
                  content = f.read()
                  # Change this part under "Extract domain and general existing steps"
                  blocks = re.split(r'\n--- Domain: (.*?) ---\n', content)
                  for i in range(1, len(blocks), 2):  # <-- Removed the '- 1'
                      d = blocks[i]
                      s = blocks[i+1]
                      if d == domain_text:
                          for line in s.split('\n'):
                              if line.strip():
                                  steps.add(line.strip())
          with open("domain_existing_steps.txt", "w", encoding="utf-8") as f:
              f.write('\n'.join(sorted(steps)) + '\n')
          PYEOF
          
          # Normalize steps by removing Given/When/Then/And/But for accurate comparison
          sed -E 's/^(Given|When|Then|And|But)\s+//' generated_steps.txt > generated_steps_norm.txt || true
          sed -E 's/^(Given|When|Then|And|But)\s+//' domain_existing_steps.txt > domain_existing_steps_norm.txt || true
          
          # Find new steps
          grep -v -F -x -f domain_existing_steps_norm.txt generated_steps_norm.txt > new_steps.txt || true
          
          NEW_STEPS_COUNT=$(wc -l < new_steps.txt || echo 0)
          TOTAL_STEPS=$(wc -l < generated_steps.txt || echo 0)
          
          if [ "$TOTAL_STEPS" -eq 0 ]; then
            INVENTED_RATIO=0
          else
            INVENTED_RATIO=$(( NEW_STEPS_COUNT * 100 / TOTAL_STEPS ))
          fi
          
          echo "Total steps: $TOTAL_STEPS"
          echo "New invented steps: $NEW_STEPS_COUNT"
          echo "Invented ratio: ${INVENTED_RATIO}%"
          
          {
            echo "TOTAL_STEPS=$TOTAL_STEPS"
            echo "NEW_STEPS_COUNT=$NEW_STEPS_COUNT"
            echo "INVENTED_RATIO=$INVENTED_RATIO"
          } >> "$GITHUB_ENV"
          
          if [ "$INVENTED_RATIO" -gt 60 ]; then
            echo "::error::Invented ratio ${INVENTED_RATIO}% exceeds hard limit of 60%. Too many new steps — review the prompt or domain."
            cat new_steps.txt
            exit 1
          elif [ "$INVENTED_RATIO" -gt 30 ]; then
            echo "::warning::Invented ratio ${INVENTED_RATIO}% exceeds soft limit of 30%. Review invented steps before merging."
            cat new_steps.txt
          elif [ -s new_steps.txt ]; then
            echo "::warning::${NEW_STEPS_COUNT} new step(s) invented (${INVENTED_RATIO}% — within threshold):"
            cat new_steps.txt
          else
            echo "SUCCESS: All generated steps match existing step library."
          fi

      # =========================
      # Commit and push
      # =========================
      - name: Commit & push
        run: |
          set -euo pipefail
          git add "$FEATURE_DIR/${{ env.FILE }}"
          git commit -m "feat(${{ inputs.jira_id }}): generate feature file" || true
          git push origin "${{ env.BRANCH }}" --force

      # =========================
      # Create Pull Request
      # =========================
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(gh pr list --head "${{ env.BRANCH }}" --base main --json number --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "Pull Request already exists: #$PR_NUMBER"
            exit 0
          fi
          
          DOMAIN_TEXT="${{ inputs.domain }}"
          [ -z "$DOMAIN_TEXT" ] && DOMAIN_TEXT="general"
          
          cat <<-EOF > pr_body.txt
          Auto-generated BDD feature file from Jira ticket parameters.
          
          ### Generation Stats
          - **Target Domain:** $DOMAIN_TEXT
          - **Total steps:** ${{ env.TOTAL_STEPS }}
          - **Invented steps:** ${{ env.NEW_STEPS_COUNT }} (${{ env.INVENTED_RATIO }}%)
          EOF

          if [ -s new_steps.txt ]; then
            printf '\n### Invented steps (needs review)\n```\n' >> pr_body.txt
            cat new_steps.txt >> pr_body.txt
            printf '```\n' >> pr_body.txt
          fi

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): ${{ env.SUMMARY }}" \
            --body-file pr_body.txt
