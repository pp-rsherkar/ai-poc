name: JIRA - Feature File (GHERKIN) Generator Using OPENAI

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., QA-1321)"
        required: true
        type: string
      llm_model:
        description: "Select LLM Model"
        required: true
        type: choice
        default: "openai/gpt-4.1"
        options:
          - openai/gpt-4.1
          - openai/gpt-4.1-mini
          - openai/gpt-4.1-nano
          - openai/gpt-4o
          - openai/gpt-4o-mini
          - openai/o1
          - openai/o1-mini
          - openai/o3
          - openai/o3-mini
          - openai/o4-mini
          - meta/llama-3.3-70b-instruct
          - mistral-ai/mistral-small-2503

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    env:
      FEATURE_DIR: src/test/resources/features
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

    steps:

      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq gh

      # =========================
      # Build step dictionary
      # =========================
      - name: Build AI repository context
        run: |
          set -euo pipefail

          mkdir -p "$FEATURE_DIR"

          if find "$FEATURE_DIR" -name "*.feature" | grep -q .; then
            find "$FEATURE_DIR" -name "*.feature" \
              -exec grep -hE "^\s*(Given|When|Then|And|But) " {} \; \
              | sed 's/^[[:space:]]*//g' \
              | sort -u \
              | head -n 300 > step_dictionary.txt
          else
            touch step_dictionary.txt
          fi

      # =========================
      # Create branch
      # =========================
      - name: Create branch
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin

          git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH"

          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      # =========================
      # Fetch Jira details (SAFE ADF parsing)
      # =========================
      - name: Fetch Jira details
        run: |
          set -euo pipefail

          RESPONSE=$(curl -s --fail \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          echo "$RESPONSE" > jira_response.json

          if echo "$RESPONSE" | jq -e '.errorMessages' >/dev/null; then
            echo "Jira API error"
            cat jira_response.json
            exit 1
          fi

          SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary // "No Summary"')

          DESCRIPTION=$(echo "$RESPONSE" | jq -r '
            [.fields.description.content[]?.content[]?.text] | join(" ")
          ')

          COMMENTS=$(echo "$RESPONSE" | jq -r '
            [.fields.comment.comments[]?.body.content[]?.content[]?.text] | join(" ")
          ')

          DESCRIPTION=${DESCRIPTION:-"No Description"}
          COMMENTS=${COMMENTS:-"No Comments"}

          DESCRIPTION=$(echo "$DESCRIPTION" | cut -c1-12000)
          COMMENTS=$(echo "$COMMENTS" | cut -c1-8000)

          {
            echo "SUMMARY<<EOF"
            echo "$SUMMARY"
            echo "EOF"
            echo "DESCRIPTION<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"
            echo "COMMENTS<<EOF"
            echo "$COMMENTS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # =========================
      # Write prompt + call model (FIXED SCOPE)
      # =========================
      - name: Generate Feature via Model
        run: |
          set -euo pipefail

          MODEL="${{ inputs.llm_model }}"

          if echo "$MODEL" | grep -Eq "^openai/o[0-9]"; then
            TOKEN_PARAM="max_completion_tokens"
          else
            TOKEN_PARAM="max_tokens"
          fi

          STEP_CONTEXT=$(head -n 80 step_dictionary.txt)

          FEATURE_EXAMPLES=""
          while IFS= read -r f; do
            FEATURE_EXAMPLES="$FEATURE_EXAMPLES
          $(cat "$f")"
                    done < <(find "$FEATURE_DIR" -name "*.feature" | head -2)
          
                    cat > prompt.txt <<EOF
          HARD RULES:
          - Output ONLY raw Gherkin
          - No markdown, no explanation
          - One @todo per scenario
          
          JIRA SUMMARY:
          $SUMMARY
          
          DESCRIPTION:
          $DESCRIPTION
          
          COMMENTS:
          $COMMENTS
          
          STEP DICTIONARY:
          $STEP_CONTEXT
          
          EXAMPLES:
          $FEATURE_EXAMPLES
          
          Feature: $SUMMARY
          
          @todo
          Scenario: Example
            Given ...
            When ...
            Then ...
          EOF

          if [ "$TOKEN_PARAM" = "max_completion_tokens" ]; then
            jq -n \
              --arg model "$MODEL" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                temperature: 0,
                max_completion_tokens: 4096,
                messages: [
                  {role: "system", content: "You are a QA automation engineer. Output only Gherkin."},
                  {role: "user", content: $prompt}
                ]
              }' > request.json
          else
            jq -n \
              --arg model "$MODEL" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                temperature: 0,
                max_tokens: 4096,
                messages: [
                  {role: "system", content: "You are a QA automation engineer. Output only Gherkin."},
                  {role: "user", content: $prompt}
                ]
              }' > request.json
          fi

          HTTP_RESPONSE=$(mktemp)

          HTTP_CODE=$(curl -s -o "$HTTP_RESPONSE" -w "%{http_code}" \
            https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            --data @request.json)

          if [ "$HTTP_CODE" -ne 200 ]; then
            cat "$HTTP_RESPONSE"
            exit 1
          fi

          FEATURE=$(jq -r '.choices[0].message.content // empty' "$HTTP_RESPONSE")
          FEATURE=$(echo "$FEATURE" | sed 's/```//g')

          if ! echo "$FEATURE" | grep -qi "^Feature:"; then
            echo "Invalid output"
            echo "$FEATURE"
            exit 1
          fi

          echo "$FEATURE" > generated.feature

      # =========================
      # Save feature
      # =========================
      - name: Save feature file
        run: |
          set -euo pipefail

          FILE="${{ inputs.jira_id }}.feature"
          mkdir -p "$FEATURE_DIR"

          cp generated.feature "$FEATURE_DIR/$FILE"

          echo "FILE=$FILE" >> "$GITHUB_ENV"

      # =========================
      # Commit & push (safe)
      # =========================
      - name: Commit & push
        run: |
          set -euo pipefail

          git add "$FEATURE_DIR/${{ env.FILE }}"

          git commit -m "feat(${{ inputs.jira_id }}): generate feature" || true

          git push origin "${{ env.BRANCH }}" --force-with-lease

      # =========================
      # Create PR
      # =========================
      - name: Create Pull Request
        run: |
          set -euo pipefail

          PR=$(gh pr list --head "${{ env.BRANCH }}" --json number --jq '.[0].number')

          if [ -n "$PR" ]; then
            echo "PR exists"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): $SUMMARY" \
            --body "Auto-generated Gherkin feature from Jira."
