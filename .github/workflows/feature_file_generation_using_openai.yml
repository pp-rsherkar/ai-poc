name: JIRA - Feature File (GHERKIN) Generator Using OPENAI

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., QA-1321)"
        required: true
        type: string
      llm_model:
        description: "Select LLM Model"
        required: true
        type: choice
        default: "openai/gpt-4.1"
        options:
          - openai/gpt-4.1
          - openai/gpt-4.1-mini
          - openai/gpt-4.1-nano
          - openai/gpt-4o
          - openai/gpt-4o-mini
          - openai/gpt-5
          - openai/gpt-5-chat
          - openai/gpt-5-mini
          - openai/gpt-5-nano
          - openai/o1
          - openai/o1-mini
          - openai/o1-preview
          - openai/o3
          - openai/o3-mini
          - openai/o4-mini
          - cohere/cohere-command-a
          - deepseek/deepseek-r1
          - deepseek/deepseek-r1-0528
          - deepseek/deepseek-v3-0324
          - meta/llama-3.2-11b-vision-instruct
          - meta/llama-3.2-90b-vision-instruct
          - meta/llama-3.3-70b-instruct
          - meta/llama-4-maverick-17b-128e-instruct-fp8
          - meta/llama-4-scout-17b-16e-instruct
          - meta/meta-llama-3.1-405b-instruct
          - meta/meta-llama-3.1-8b-instruct
          - mistral-ai/codestral-2501
          - mistral-ai/ministral-3b
          - mistral-ai/mistral-medium-2505
          - mistral-ai/mistral-small-2503
          - microsoft/phi-4
          - microsoft/phi-4-mini-instruct
          - microsoft/phi-4-mini-reasoning
          - microsoft/phi-4-multimodal-instruct
          - microsoft/phi-4-reasoning  

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    env:
      FEATURE_DIR: src/test/resources/features

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # Build reusable step dictionary
      # =========================
      - name: Build AI repository context
        run: |
          set -euo pipefail
          
          mkdir -p "$FEATURE_DIR"
          FEATURE_COUNT=$(find "$FEATURE_DIR" -name "*.feature" | wc -l)
          
          if [ "$FEATURE_COUNT" -gt 0 ]; then
            TEMP_FILE=$(mktemp)
            find "$FEATURE_DIR" -name "*.feature" \
              -exec grep -hE "^\s*(Given|When|Then|And|But) " {} \; \
              2>/dev/null \
              | sed 's/^[[:space:]]*//g' \
              | sort -u \
              > "$TEMP_FILE"
            head -n 300 "$TEMP_FILE" > step_dictionary.txt
            rm -f "$TEMP_FILE"
          else
            touch step_dictionary.txt
          fi
          
          echo "Reusable step count:"
          wc -l step_dictionary.txt

      # =========================
      # Create working branch
      # =========================
      - name: Create branch
        run: |
          set -euo pipefail
          BRANCH="${{ inputs.jira_id }}"
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
          git fetch origin
          git checkout -b "$BRANCH" || git checkout "$BRANCH"
          
          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      # =========================
      # Fetch Jira details
      # =========================
      - name: Fetch Jira details
        run: |
          set -euo pipefail
      
          RESPONSE=$(curl -s --fail \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")
      
          echo "$RESPONSE" > jira_response.json
      
          if echo "$RESPONSE" | jq -e '.errorMessages' >/dev/null; then
            echo "Jira API returned an error:"
            cat jira_response.json
            exit 1
          fi
      
          SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary // "No Summary"')
          DESCRIPTION=$(echo "$RESPONSE" | jq -r '.fields.description | .. | .text? // empty' \
            | tr "\n" " " | sed 's/[[:space:]]\+/ /g')
          COMMENTS=$(echo "$RESPONSE" | jq -r \
            '.fields.comment.comments | sort_by(.created) | .[] | (.author.displayName // "Unknown") + ": " + (.body | .. | .text? // empty)' \
            | tr "\n" " " | sed 's/[[:space:]]\+/ /g')
      
          [ -z "$DESCRIPTION" ] && DESCRIPTION="No Description"
          [ -z "$COMMENTS" ]    && COMMENTS="No Comments"
      
          # Warn if truncation would occur — don't silently drop content
          DESC_LEN=${#DESCRIPTION}
          COMM_LEN=${#COMMENTS}
      
          if [ "$DESC_LEN" -gt 12000 ]; then
            echo "WARNING: Description is ${DESC_LEN} chars — exceeds 12000, will be truncated. Consider splitting the ticket."
          fi
          if [ "$COMM_LEN" -gt 8000 ]; then
            echo "WARNING: Comments are ${COMM_LEN} chars — exceeds 8000, will be truncated."
          fi
      
          DESCRIPTION=$(echo "$DESCRIPTION" | cut -c1-12000)
          COMMENTS=$(echo "$COMMENTS" | cut -c1-8000)
      
          {
            echo "SUMMARY<<EOF"
            echo "$SUMMARY"
            echo "EOF"
            echo "DESCRIPTION<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"
            echo "COMMENTS<<EOF"
            echo "$COMMENTS"
            echo "EOF"
          } >> "$GITHUB_ENV"


      # =========================
      # List Available Models
      # =========================
      - name: List available models
        env:
          # Bound directly to your custom repository secret
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS \
            https://models.github.ai/catalog/models \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json")
          echo "$RESPONSE" | jq -r 'if type=="object" and (.data|type=="array") then .data[].id elif type=="array" then .[].id else empty end'

      # =========================
      # Generate Feature File
      # =========================
      - name: Generate feature via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          SUMMARY: ${{ env.SUMMARY }}
          DESCRIPTION: ${{ env.DESCRIPTION }}
          COMMENTS: ${{ env.COMMENTS }}
        run: |
          set -euo pipefail
          echo "Preparing repository context..."

          STEP_CONTEXT=$(head -n 300 step_dictionary.txt)
          FEATURE_EXAMPLES=$(
            find "$FEATURE_DIR" -name "*.feature" \
            | head -3 \
            | while read -r f; do cat "$f"; done \
            | head -n 600
          )

          # Determine correct token parameter based on model family
          MODEL="${{ inputs.llm_model }}"
          if echo "$MODEL" | grep -Eq "^openai/(o[0-9]|gpt-5)"; then
            TOKEN_PARAM="max_completion_tokens"
          else
            TOKEN_PARAM="max_tokens"
          fi

          # NOTE: unquoted PROMPT_EOF so variables are interpolated
          cat <<PROMPT_EOF > prompt.txt
          ==================================================
          HARD RULES — non-negotiable, checked before output
          ==================================================
          1. Return ONLY raw valid Gherkin. No markdown, no code fences, no explanations, no preamble.
          2. Every Scenario and Scenario Outline must be preceded by exactly one @todo tag on its own line.
             Example:
               @todo
               Scenario: User logs in with valid credentials
          3. NEVER place @todo on the same line as Scenario. NEVER emit two @todo tags before one Scenario.
          4. Reuse existing repository steps with EXACT wording. If a semantically equivalent step exists
             in the STEP DICTIONARY below, you MUST use that exact phrasing. Only coin a new step when no
             existing step covers the action — and mark it with an inline comment: # NEW STEP
          5. Do not invent test cases. Every scenario must be traceable to the Jira description or comments.

          ==================================================
          DECISION RULES — choose the right construct
          ==================================================

          [Scenario vs Scenario Outline]
          Use plain Scenario by default.
          Use Scenario Outline + Examples table ONLY when ALL of the following are true:
            a) The exact same steps apply to 2 or more distinct input/output combinations
            b) Those combinations are explicitly stated or clearly implied in the Jira ticket
               (e.g. multiple user roles, listed boundary values, enumerated statuses)
            c) The Examples table has at least 2 data rows
          If only one data row would appear in Examples — use a plain Scenario instead.

          [When to use a data table]
          Use a Gherkin data table (pipe-delimited rows attached to a step) when:
            - A single step needs to supply 3 or more key-value pairs (e.g. filling a form)
            - A step needs to pass a list of items in one action (e.g. a set of permissions,
              a batch of records, multiple table rows to verify)
          Do NOT use a data table for 1-2 values — use inline step parameters instead.

          Data table example (form fill):
            When I submit the registration form with:
              | field     | value             |
              | firstName | John              |
              | lastName  | Doe               |
              | email     | john@example.com  |
              | role      | admin             |

          Data table example (list assertion):
            Then the following permissions should be visible:
              | permission         |
              | View reports       |
              | Export data        |
              | Manage users       |

          ==================================================
          SCENARIO GENERATION INSTRUCTIONS
          ==================================================
          Step 1 — Extract acceptance criteria:
            Read the Jira DESCRIPTION and COMMENTS carefully.
            Identify every explicit or implied acceptance criterion.
            Each criterion maps to one or more scenarios.

          Step 2 — Scenario types to cover (only if the ticket implies them):
            - Happy path (core success flow)
            - Input validation / boundary conditions
            - Negative / error flows
            - Permission / role-based access (only if roles are mentioned in the ticket)
            - Edge cases explicitly mentioned in comments

          Step 3 — Write scenarios:
            - Keep steps in Given / When / Then / And / But order
            - Use business-readable language (no technical implementation details)
            - Keep each scenario focused on one behaviour
            - Avoid duplicate scenarios
            - Prefer repository step wording over generating new steps

          ==================================================
          JIRA DETAILS
          ==================================================
          ID: ${{ inputs.jira_id }}
          SUMMARY: $SUMMARY
          DESCRIPTION: $DESCRIPTION
          COMMENTS: $COMMENTS

          ==================================================
          REPOSITORY FEATURE EXAMPLES (follow these conventions exactly)
          ==================================================
          $FEATURE_EXAMPLES

          ==================================================
          STEP DICTIONARY (reuse these steps with exact wording)
          ==================================================
          $STEP_CONTEXT

          ==================================================
          OUTPUT FORMAT
          ==================================================
          Feature: <concise feature name derived from Jira summary>

            Background: (include only if 2+ scenarios share the same Given steps)
              Given ...

            @todo
            Scenario: <...>
              Given ...
              When ...
              Then ...

            @todo
            Scenario Outline: <...>
              Given ...
              When ... "<param>"
              Then ...

              Examples:
                | param  |
                | value1 |
                | value2 |
          PROMPT_EOF

          # Build request with correct token parameter for this model family
          if [ "$TOKEN_PARAM" = "max_completion_tokens" ]; then
            jq -n \
              --arg model "$MODEL" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                temperature: 0,
                max_completion_tokens: 4096,
                messages: [
                  {
                    role: "system",
                    content: "You are a senior QA automation engineer. Your sole output is raw valid Gherkin — no markdown, no fences, no commentary. You follow the hard rules and decision rules in the user prompt exactly, in order. When in doubt about a construct, default to the simpler one."
                  },
                  {
                    role: "user",
                    content: $prompt
                  }
                ]
              }' > request.json
          else
            jq -n \
              --arg model "$MODEL" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                temperature: 0,
                max_tokens: 4096,
                messages: [
                  {
                    role: "system",
                    content: "You are a senior QA automation engineer. Your sole output is raw valid Gherkin — no markdown, no fences, no commentary. You follow the hard rules and decision rules in the user prompt exactly, in order. When in doubt about a construct, default to the simpler one."
                  },
                  {
                    role: "user",
                    content: $prompt
                  }
                ]
              }' > request.json
          fi

          echo "Generating feature file..."

          HTTP_RESPONSE=$(mktemp)

          HTTP_CODE=$(curl -s -o "$HTTP_RESPONSE" -w "%{http_code}" \
            https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data @request.json)

          echo "HTTP Status: $HTTP_CODE"
          cat "$HTTP_RESPONSE"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Model API request failed"
            exit 1
          fi

          RESPONSE=$(cat "$HTTP_RESPONSE")
          echo "$RESPONSE" > model_response.json

          FEATURE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          FEATURE=$(echo "$FEATURE" \
            | sed 's/```gherkin//g' \
            | sed 's/```//g')

          if [ -z "$FEATURE" ]; then
            echo "Model returned empty output"
            cat model_response.json
            exit 1
          fi

          if ! echo "$FEATURE" | grep -q "^Feature:"; then
            echo "Invalid Gherkin generated"
            echo "$FEATURE"
            exit 1
          fi

          if ! echo "$FEATURE" | grep -Eq "Scenario:|Scenario Outline:"; then
            echo "No scenarios generated"
            echo "$FEATURE"
            exit 1
          fi

          echo "$FEATURE" > generated.feature
          echo "Feature file generated successfully"

      # =========================
      # Save feature file
      # =========================
      - name: Save feature file
        run: |
          set -euo pipefail
          FILE="${{ inputs.jira_id }}.feature"
          mkdir -p "$FEATURE_DIR"
      
          cp generated.feature "$FEATURE_DIR/$FILE"
      
          if [ ! -s "$FEATURE_DIR/$FILE" ]; then
            echo "Generated feature file is empty"
            exit 1
          fi
      
          if ! grep -q "^Feature:" "$FEATURE_DIR/$FILE"; then
            echo "Saved file missing Feature: declaration"
            exit 1
          fi
      
          echo "FILE=$FILE" >> "$GITHUB_ENV"
            
      # =========================
      # Commit and push
      # =========================
      - name: Commit & push
        run: |
          set -euo pipefail
          git add "$FEATURE_DIR/${{ env.FILE }}"
          git commit -m "feat(${{ inputs.jira_id }}): generate feature file" || true
          git push origin "${{ env.BRANCH }}" --force

      # =========================
      # Create Pull Request
      # =========================
      - name: Create Pull Request
        env:
          # Using your custom repository secret for the GitHub CLI client mapping layer
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(gh pr list --head "${{ env.BRANCH }}" --base main --json number --jq '.[0].number')
          
          if [ -n "$PR_NUMBER" ]; then
            echo "Pull Request already exists"
            exit 0
          fi
          
          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): ${{ env.SUMMARY }}" \
            --body "Auto-generated BDD feature file from Jira ticket parameters."
