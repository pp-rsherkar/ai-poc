name: Generate Feature from Jira

on:
  workflow_dispatch:
    inputs:
      issue_id:
        description: 'Jira Issue ID (e.g., QA-1321)'
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  create-feature:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Fetch Jira story using API
      - name: Fetch Jira story
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          ISSUE_ID: ${{ github.event.inputs.issue_id }}
        run: |
          echo "Fetching Jira issue $ISSUE_ID..."
          RESPONSE=$(curl -s -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/issue/$ISSUE_ID")
          
          SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary')
          DESCRIPTION=$(echo "$RESPONSE" | jq -r '.fields.description // "No description"')

          SUMMARY_SLUG=$(echo "$SUMMARY" | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:] \n' | tr ' ' '-')
          FEATURE_FILE="src/test/resources/features/$ISSUE_ID-$SUMMARY_SLUG.feature"
          mkdir -p $(dirname "$FEATURE_FILE")
          echo "Feature: $SUMMARY" > $FEATURE_FILE
          echo "" >> $FEATURE_FILE
          echo "  # Description: $DESCRIPTION" >> $FEATURE_FILE
          echo "" >> $FEATURE_FILE
          echo "  Scenario: Default scenario" >> $FEATURE_FILE
          echo "    # Steps to be implemented" >> $FEATURE_FILE

          echo "FEATURE_FILE=$FEATURE_FILE" >> $GITHUB_ENV

      # Step 3: Commit the new feature file
      - name: Commit feature file
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout -b feature/${{ github.event.inputs.issue_id }}
          git add $FEATURE_FILE
          git commit -m "Add feature file for ${{ github.event.inputs.issue_id }}"
          git push origin feature/${{ github.event.inputs.issue_id }}

      # Step 4: Create a Pull Request
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Add feature file for ${{ github.event.inputs.issue_id }}"
          branch: feature/${{ github.event.inputs.issue_id }}
          title: "Feature: ${{ github.event.inputs.issue_id }}"
          body: "Auto-generated feature file from Jira story ${{ github.event.inputs.issue_id }}"
