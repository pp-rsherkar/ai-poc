name: JIRA GITHUB Linkage Feature Generator

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter Jira Ticket ID (e.g., QA-1321)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # Checkout
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Install dependencies
      # =========================
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # Create branch (CRITICAL FIX)
      # =========================
      - name: Create Jira branch
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin main

          git checkout -b "$BRANCH" origin/main || git checkout "$BRANCH"

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # =========================
      # Fetch Jira safely (FIXED JSON parsing)
      # =========================
      - name: Fetch Jira Issue
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          set -euo pipefail

          RESPONSE=$(curl -s \
            -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/issue/${{ inputs.jira_id }}")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary // "NO_SUMMARY"')

          DESCRIPTION=$(echo "$RESPONSE" | jq -r '
            .. | objects | .text? // empty
          ' | tr '\n' ' ' | head -c 1200)

          echo "SUMMARY=$SUMMARY" >> $GITHUB_ENV
          echo "DESCRIPTION=$DESCRIPTION" >> $GITHUB_ENV

      # =========================
      # Build prompt (SAFE + SMALL)
      # =========================
      - name: Build AI prompt
        run: |
          set -euo pipefail

          cat <<EOF > prompt.txt
          You are a senior QA automation engineer.
          
          Generate a production-ready BDD Gherkin feature file.
          
          RULES:
          - Use existing repo style
          - Reuse steps when possible
          - Do not copy Jira text directly
          - Output ONLY raw Gherkin
          
          JIRA ID: ${{ inputs.jira_id }}
          SUMMARY: $SUMMARY
          
          DESCRIPTION:
          $(echo "$DESCRIPTION" | head -c 1200)
          
          EOF

      # =========================
      # Call GitHub Models (FIXED AUTH)
      # =========================
      - name: Generate Feature
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          jq -n \
            --rawfile prompt prompt.txt \
            '{
              model: "gpt-4.1",
              temperature: 0.2,
              messages: [
                { role: "system", content: "You generate enterprise BDD feature files." },
                { role: "user", content: $prompt }
              ]
            }' > request.json

          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            --data @request.json)

          echo "$RESPONSE"

          FEATURE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$FEATURE" ] || [ "$FEATURE" = "null" ]; then
            echo "Model failed"
            exit 1
          fi

          echo "$FEATURE" > generated.feature

      # =========================
      # Save file (SAFE naming from summary)
      # =========================
      - name: Save feature file
        run: |
          set -euo pipefail

          DIR="src/test/resources/features"
          mkdir -p "$DIR"

          CLEAN_NAME=$(echo "$SUMMARY" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/_/g' \
            | sed 's/_\+/_/g' \
            | cut -c1-60)

          [ -z "$CLEAN_NAME" ] && CLEAN_NAME="feature"

          FILE="$DIR/${{ inputs.jira_id }}_${CLEAN_NAME}.feature"

          mv generated.feature "$FILE"

          echo "FILE=$FILE" >> $GITHUB_ENV

      # =========================
      # Commit
      # =========================
      - name: Commit and push (overwrite branch)
        run: |
          set -euo pipefail
      
          git add "$FILE"
      
          git commit -m "feat(QA-1321): generate BDD feature" || echo "No changes to commit"
      
          # overwrite remote branch safely
          git push --force-with-lease origin "$BRANCH"

      # =========================
      # Create PR (FIXED MAIN → BRANCH ONLY)
      # =========================
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.jira_id }}"

          EXISTING_PR=$(gh pr list \
            --head "$BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat($BRANCH): $SUMMARY" \
            --body "Auto-generated BDD feature file from Jira"
