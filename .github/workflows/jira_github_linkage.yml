name: JIRA GHERKIN Generator (Production Ready)

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., QA-1321)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    env:
      FEATURE_DIR: src/test/resources/features

    steps:

      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # Build reusable step dictionary
      # =========================
      - name: Build AI repository context
        run: |
          set -euo pipefail
      
          mkdir -p "$FEATURE_DIR"
      
          FEATURE_COUNT=$(find "$FEATURE_DIR" -name "*.feature" | wc -l)
      
          if [ "$FEATURE_COUNT" -gt 0 ]; then
      
            TEMP_FILE=$(mktemp)
      
            find "$FEATURE_DIR" -name "*.feature" \
              -exec grep -hE "^\s*(Given|When|Then|And|But) " {} \; \
              2>/dev/null \
              | sed 's/^[[:space:]]*//g' \
              | sort -u \
              > "$TEMP_FILE"
      
            head -n 300 "$TEMP_FILE" > step_dictionary.txt
      
            rm -f "$TEMP_FILE"
      
          else
            touch step_dictionary.txt
          fi
      
          echo "Reusable step count:"
          wc -l step_dictionary.txt

      # =========================
      # Create working branch
      # =========================
      - name: Create branch
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin

          git checkout -b "$BRANCH" || git checkout "$BRANCH"

          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      # =========================
      # Fetch Jira
      # =========================
      - name: Fetch Jira details
        run: |
          set -euo pipefail

          echo "Fetching Jira issue: ${{ inputs.jira_id }}"

          RESPONSE=$(curl -s --fail \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          echo "$RESPONSE" > jira_response.json

          # Validate Jira response
          if echo "$RESPONSE" | jq -e '.errorMessages' >/dev/null; then
            echo "Jira API returned an error:"
            cat jira_response.json
            exit 1
          fi

          # Summary
          SUMMARY=$(echo "$RESPONSE" | jq -r '
            .fields.summary // "No Summary"
          ')

          # Description (ADF-safe)
          DESCRIPTION=$(echo "$RESPONSE" | jq -r '
            .fields.description
            | .. | .text? // empty
          ' | tr "\n" " " | sed 's/[[:space:]]\+/ /g')

          # Comments (ADF-safe)
          COMMENTS=$(echo "$RESPONSE" | jq -r '
            .fields.comment.comments
            | sort_by(.created)
            | .[]
            | (
                .author.displayName // "Unknown"
              ) + ": " + (
                .body
                | .. | .text? // empty
              )
          ' | tr "\n" " " | sed 's/[[:space:]]\+/ /g')

          # Fallbacks
          [ -z "$DESCRIPTION" ] && DESCRIPTION="No Description"
          [ -z "$COMMENTS" ] && COMMENTS="No Comments"

          # Token protection
          DESCRIPTION=$(echo "$DESCRIPTION" | cut -c1-12000)
          COMMENTS=$(echo "$COMMENTS" | cut -c1-8000)

          {
            echo "SUMMARY<<EOF"
            echo "$SUMMARY"
            echo "EOF"

            echo "DESCRIPTION<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"

            echo "COMMENTS<<EOF"
            echo "$COMMENTS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # =========================
      # Generate Feature File
      # =========================
      - name: List available models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -s \
            https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            | jq -r '.[].id'
      
      # =========================
      # Generate Feature File
      # =========================
      - name: Generate feature via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Preparing repository context..."

          # Relevant reusable steps
          STEP_CONTEXT=$(head -n 120 step_dictionary.txt)

          # Real feature examples
          FEATURE_EXAMPLES=$(
            find "$FEATURE_DIR" -name "*.feature" \
            | head -3 \
            | while read -r f; do
                cat "$f"
              done \
            | head -n 350
          )

          cat <<EOF > prompt.txt
          Generate a production-quality Cucumber Gherkin feature file matching repository conventions.

          ==================================================
          RULES
          ==================================================

          - Return ONLY raw valid Gherkin
          - No markdown
          - No code fences
          - No explanations
          - Reuse existing repository steps whenever possible
          - Prefix every Scenario or Scenario Outline with @todo
          - Keep scenarios concise and automation-friendly
          - Use business-readable language
          - Avoid duplicate scenarios
          - Prefer repository wording over generating new steps
          - Use Scenario Outline ONLY when permutations are required

          Generate:
          - Happy path scenarios
          - Validation scenarios
          - Negative scenarios
          - Permission/security scenarios if implied

          ==================================================
          JIRA DETAILS
          ==================================================

          ID:
          ${{ inputs.jira_id }}

          SUMMARY:
          $SUMMARY

          DESCRIPTION:
          $DESCRIPTION

          COMMENTS:
          $COMMENTS

          ==================================================
          REPOSITORY FEATURE EXAMPLES
          ==================================================

          $FEATURE_EXAMPLES

          ==================================================
          RELEVANT STEP DEFINITIONS
          ==================================================

          $STEP_CONTEXT

          ==================================================
          OUTPUT FORMAT
          ==================================================

          Feature: <name>

          EOF

          jq -n \
            --rawfile prompt prompt.txt \
            '{
              model: "anthropic/claude-opus-4.7",
              temperature: 0,
              messages: [
                {
                  role: "system",
                  content: "You are a senior QA automation engineer generating enterprise-grade Cucumber Gherkin feature files.\n\nRules:\n- Return ONLY raw valid Gherkin\n- No markdown\n- No explanations\n- Follow repository conventions exactly\n- Prefer reusable repository steps\n- Use concise business-readable language\n- Generate deterministic automation-friendly scenarios\n- Avoid duplicate scenarios\n- Use Scenario Outline only when necessary"
                },
                {
                  role: "user",
                  content: $prompt
                }
              ]
            }' > request.json

          echo "Generating feature file..."

          HTTP_RESPONSE=$(mktemp)

          HTTP_CODE=$(curl -s \
          -o "$HTTP_RESPONSE" \
          -w "%{http_code}" \
          https://models.github.ai/inference/chat/completions \
          -H "Accept: application/vnd.github+json" \
          -H "Content-Type: application/json" \
          -H "Authorization: ******" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          --data @request.json)
          
          echo "HTTP Status: $HTTP_CODE"
          
          cat "$HTTP_RESPONSE"
          
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Model API request failed"
            exit 1
          fi
          
          RESPONSE=$(cat "$HTTP_RESPONSE")

          echo "$RESPONSE" > model_response.json

          FEATURE=$(echo "$RESPONSE" | jq -r '
            .choices[0].message.content // empty
          ')

          # Cleanup accidental markdown
          FEATURE=$(echo "$FEATURE" \
            | sed 's/```gherkin//g' \
            | sed 's/```//g')

          # Validate output
          if [ -z "$FEATURE" ]; then
            echo "Model returned empty output"
            cat model_response.json
            exit 1
          fi

          # Validate Feature
          if ! echo "$FEATURE" | grep -q "^Feature:"; then
            echo "Invalid Gherkin generated"
            echo "$FEATURE"
            exit 1
          fi

          # Validate Scenario
          if ! echo "$FEATURE" | grep -Eq "Scenario:|Scenario Outline:"; then
            echo "No scenarios generated"
            echo "$FEATURE"
            exit 1
          fi

          echo "$FEATURE" > generated.feature

          echo "Feature file generated successfully"

      # =========================
      # Save feature file
      # =========================
      - name: Save feature file
        run: |
          set -euo pipefail

          FILE="${{ inputs.jira_id }}.feature"

          mkdir -p "$FEATURE_DIR"

          awk '
          /^(Scenario:|Scenario Outline:)/ {
            if (prev != "@todo") {
              print "@todo"
            }
            print $0
            prev="@todo"
            next
          }
          {
            prev=""
            print
          }
          ' generated.feature > "$FEATURE_DIR/$FILE"

          if [ ! -s "$FEATURE_DIR/$FILE" ]; then
            echo "Generated feature file is empty"
            exit 1
          fi

          echo "FILE=$FILE" >> "$GITHUB_ENV"

      # =========================
      # Commit and push
      # =========================
      - name: Commit & push
        run: |
          set -euo pipefail

          git add "$FEATURE_DIR/${{ env.FILE }}"

          git commit -m "feat(${{ inputs.jira_id }}): generate feature file" || true

          git push origin "${{ env.BRANCH }}" --force

      # =========================
      # Create Pull Request
      # =========================
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(gh pr list \
            --head "${{ env.BRANCH }}" \
            --base main \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "Pull Request already exists"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): $SUMMARY" \
            --body "Auto-generated BDD feature file from Jira"
