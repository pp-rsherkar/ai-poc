name: JIRA GITHUB Linkage Feature Generator

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: 'Enter the JIRA Ticket ID (e.g., QA-1321)'
        required: true
        type: string

  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  generate-feature-file:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # =========================
      # CLEAN CHECKOUT
      # =========================
      - name: Checkout main (clean)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          clean: true

      - name: Ensure clean workspace
        run: |
          git clean -fd

      # =========================
      # STEP INDEX (Your Dictionary)
      # =========================
      - name: Build step index from main
        run: |
          echo "Building step index..."
          STEP_INDEX=$(find src/test/resources/features -name "*.feature" \
            -exec grep -E "^\s*(Given|When|Then|And|But) " {} \; \
            | sed -e 's/^[ \t]*//' \
            | sort | uniq)
          
          echo "$STEP_INDEX" > step_dictionary.txt

      # =========================
      # BRANCH HANDLING
      # =========================
      - name: Create or reuse Jira branch
        run: |
          BRANCH="${{ inputs.jira_id }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin main

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git pull --rebase origin "$BRANCH"
          else
            git checkout -b "$BRANCH" origin/main
          fi
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # =========================
      # JIRA FETCH (With Enhanced Debugging)
      # =========================
      - name: Fetch Jira Issue
        run: |
          echo "Connecting to Jira API..."
          
          # Execute the curl request and save raw output to a file to prevent token exposure in logs
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          # Extract HTTP Status safely
          HTTP_STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2 | tr -d '[:space:]')

          echo "Status Received: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Jira API failed with HTTP Status: $HTTP_STATUS"
            echo "--- Raw Response Payload (First 500 characters) ---"
            echo "$RESPONSE" | sed '$d' | head -c 500
            exit 1
          fi

          # If successful, extract data
          JSON=$(echo "$RESPONSE" | sed '$d')
          SUMMARY=$(echo "$JSON" | jq -r '.fields.summary // "NO_SUMMARY"')
          DESCRIPTION=$(echo "$JSON" | jq -r '[.. | .text? // empty] | join(" ")' | tr -d '\n\r')

          # Save values cleanly
          echo "SUMMARY=$SUMMARY" >> $GITHUB_ENV
          echo "$DESCRIPTION" > jira_description.txt
          
          echo "✅ Successfully fetched Jira ticket: $SUMMARY"

      # =========================
      # NATIVE GITHUB LLM INFERENCE via CURL
      # =========================
      - name: Generate Feature File via GitHub Models API
        run: |
          echo "Prompting GitHub's LLM engine..."
          
          # Escaping variables safely for the JSON payload
          DICT=$(cat step_dictionary.txt | jq -aR .)
          JIRA_DESC=$(cat jira_description.txt | jq -aR .)
          JIRA_SUMM=$(echo "${{ env.SUMMARY }}" | jq -aR .)

          PROMPT="You are a QA automation engineer. Generate a BDD Gherkin .feature file for Jira Ticket ${{ inputs.jira_id }}.
          Jira Summary: $JIRA_SUMM
          Jira Description: $JIRA_DESC
          
          Here is a dictionary of existing steps in our repository. You MUST reuse these exact step phrasings or formats where contextually appropriate so we don't duplicate code:
          $DICT
          
          Provide your response back in raw Gherkin format. Do not wrap it in markdown code blocks. Start directly with 'Feature:'"

          # Querying GitHub's OpenAI/Copilot Proxy endpoint natively using standard token privileges
          curl -s -X POST "https://models.inference.ai.azure.com/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -d "{
              \"model\": \"gpt-4o\",
              \"messages\": [
                {\"role\": \"user\", \"content\": $(echo "$PROMPT" | jq -Rxs .)}
              ],
              \"temperature\": 0.2
            }" | jq -r '.choices[0].message.content' > generated.feature

      # =========================
      # FEATURE FILE NAMING & PLACEMENT
      # =========================
      - name: Save and Name Feature File
        run: |
          RAW_DESC_SNIPPET=$(cat jira_description.txt | head -c 40)
          CLEAN_DESC=$(echo "$RAW_DESC_SNIPPET" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/_/g' \
            | sed 's/__*/_/g' \
            | sed 's/^_//;s/_$//')

          if [ -z "$CLEAN_DESC" ]; then CLEAN_DESC="feature"; fi

          FILE_NAME="${{ inputs.jira_id }}_${CLEAN_DESC}.feature"
          TARGET_DIR="src/test/resources/features"
          mkdir -p "$TARGET_DIR"

          mv generated.feature "$TARGET_DIR/$FILE_NAME"

          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV
          
          echo "--- Generated Feature Preview ---"
          cat "$TARGET_DIR/$FILE_NAME"

      # =========================
      # SAFE COMMIT & PR
      # =========================
      - name: Commit and push (safe)
        run: |
          git add "${{ env.TARGET_DIR }}/${{ env.FILE_NAME }}"
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "feat(${{ inputs.jira_id }}): generate contextual BDD feature file"
            git push --force-with-lease origin "${{ env.BRANCH }}"
          fi

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --head "${{ env.BRANCH }}" --base main --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists"
            exit 0
          fi

          PR_BODY="Auto-generated smart BDD feature file tailored to matching step definitions using GitHub LLM.\n\nJira ID: ${{ inputs.jira_id }}"
          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): BDD Feature Implementation" \
            --body "$PR_BODY"
