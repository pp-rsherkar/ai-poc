name: JIRA GHERKIN Generator (Production Ready)

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., QA-1321)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Install dependencies
      # =========================
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # Build step dictionary (SAFE)
      # =========================
      - name: Build AI context
        run: |
          set -euo pipefail

          mkdir -p src/test/resources/features

          # SAFE extraction (no pipe failures)
          if find src/test/resources/features -name "*.feature" | read; then
            find src/test/resources/features -name "*.feature" \
              -exec grep -hE "^\s*(Given|When|Then|And|But) " {} \; \
              2>/dev/null \
              | sort -u \
              | head -n 200 > step_dictionary.txt || true
          else
            echo "" > step_dictionary.txt
          fi

      # =========================
      # Create branch
      # =========================
      - name: Create branch
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin || true
          git checkout -B "$BRANCH"

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # =========================
      # Fetch Jira (FIXED JSON handling)
      # =========================
      - name: Fetch Jira
        run: |
          set -euo pipefail

          RESPONSE=$(curl -s \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary // "No Summary"')

          # flatten Atlassian JSON properly
          DESCRIPTION=$(echo "$RESPONSE" \
            | jq -r '.. | .text? // empty' \
            | tr '\n' ' ' \
            | head -c 1200)

          echo "SUMMARY=$SUMMARY" >> $GITHUB_ENV
          echo "DESCRIPTION=$DESCRIPTION" >> $GITHUB_ENV

      # =========================
      # Generate Feature (FINAL PROMPT)
      # =========================
      - name: Generate feature via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          STEP_CONTEXT=$(head -n 150 step_dictionary.txt)

          cat <<EOF > prompt.txt
          You are a Senior QA Automation Engineer working in a mature Cucumber BDD framework.
          
          ==================================================
          CRITICAL OUTPUT RULES
          ==================================================
          - Output ONLY raw Gherkin
          - No markdown
          - No code fences
          - No explanations
          - Every Scenario must start with @todo exactly once
          - No duplicate @todo tags
          - Use existing steps whenever possible
          - Do NOT repeat scenario headers
          - Do NOT add placeholders like $SUMMARY
          - Output clean Gherkin only
          - DO NOT use variables like $SUMMARY or $DESCRIPTION in output.
          - Always convert into natural language feature names.
          
          ==================================================
          JIRA
          ==================================================
          ID: ${{ inputs.jira_id }}
          SUMMARY: $SUMMARY
          DESCRIPTION: $DESCRIPTION
          
          ==================================================
          REPOSITORY STEPS
          ==================================================
          $STEP_CONTEXT
          
          ==================================================
          TEST DATA RULES (ENHANCED - PRODUCTION SAFE)
          ==================================================
          
          You MUST choose ONE of the following based on Jira + repo patterns.
          
          --------------------------------------------------
          1. INLINE DATA (DEFAULT - PREFERRED)
          --------------------------------------------------
          Use natural language values in steps.
          
          Example:
          Given a tactic with 3 creatives
          And all creatives have active schedules
          
          Use this unless there is a strong need for structured data.
          
          --------------------------------------------------
          2. DATA TABLES (ONLY IF LOGIC IS STRUCTURED OR REPO USES IT)
          --------------------------------------------------
          Use Data Tables ONLY when:
          
          - The scenario has multiple attributes for same entity
          - OR repository already uses tables
          - OR Jira explicitly describes structured fields
          
          Example:
          Given a tactic exists with:
            | creatives | 3 |
            | schedule  | active |
            | flights   | 2 |
          
          RULES:
          - Max 5 rows
          - No nested tables
          - No tables unless necessary for clarity
          - NEVER introduce tables just for formatting
          
          --------------------------------------------------
          3. SCENARIO OUTLINE + EXAMPLES (ONLY FOR DATA VARIANTS)
          --------------------------------------------------
          Use Scenario Outline ONLY when:
          
          - Same scenario repeats with different inputs
          - OR Jira describes multiple test permutations
          - OR repository already contains Scenario Outline
          
          Example:
          Scenario Outline: Validate scheduling behavior for creatives
          
            Given a tactic with "<creative_count>" creatives
            And schedule state is "<schedule_state>"
          
            When user views scheduling dashboard
            Then system shows "<expected_result>"
          
          Examples:
            | creative_count | schedule_state | expected_result |
            | 1              | partial        | no warning      |
            | 3              | full           | warning shown   |
            | 5              | none           | full warning    |
          
          RULES:
          - Must map 1:1 with Jira variations
          - Do NOT create examples unless multiple cases exist
          
          --------------------------------------------------
          4. DECISION RULE (VERY IMPORTANT)
          --------------------------------------------------
          You must decide in this order:
          
          1st priority → INLINE DATA
          2nd priority → DATA TABLES (if structure needed)
          3rd priority → SCENARIO OUTLINE (if multiple permutations exist)
          
          Never skip directly to tables or outlines.
          Never mix all 3 in one scenario unless repo already does.
          
          ==================================================
          LOGIN RULES
          ==================================================
          - Reuse login steps if present in repo
          - Otherwise assume user is already authenticated
          - Do NOT invent authentication flows
          
          ==================================================
          OUTPUT FORMAT
          ==================================================
          Feature: <name>
          
          EOF

          jq -n \
            --rawfile prompt prompt.txt \
            '{
              model: "gpt-4.1-mini",
              temperature: 0.2,
              messages: [
                { role: "system", content: "Return ONLY valid Gherkin." },
                { role: "user", content: $prompt }
              ]
            }' > request.json

          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            --data @request.json)

          FEATURE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          # cleanup fences if model misbehaves
          FEATURE=$(echo "$FEATURE" | sed 's/```gherkin//g' | sed 's/```//g')

          echo "$FEATURE" > generated.feature

      # =========================
      # Save + enforce @todo fix
      # =========================
      - name: Save feature file
        run: |
          set -euo pipefail

          DIR="src/test/resources/features"
          mkdir -p "$DIR"

          FILE="${{ inputs.jira_id }}.feature"

          # ensure single @todo per scenario
          awk '
          /^Scenario:/ {print "@todo"}
          {print}
          ' generated.feature > "$DIR/$FILE"

          echo "DIR=$DIR" >> $GITHUB_ENV
          echo "FILE=$FILE" >> $GITHUB_ENV

      # =========================
      # Commit + FORCE PUSH (overwrite branch)
      # =========================
      - name: Commit & push
        run: |
          set -euo pipefail

          git add "$DIR/$FILE"

          git commit -m "feat(${{ inputs.jira_id }}): generate feature file" || true

          git push origin "${{ env.BRANCH }}" --force

      # =========================
      # Create PR safely
      # =========================
      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR=$(gh pr list \
            --head "${{ env.BRANCH }}" \
            --base main \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR" ]; then
            echo "PR already exists"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): $SUMMARY" \
            --body "Auto-generated BDD feature file from Jira"
