name: JIRA GITHUB Linkage Feature Generator

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: 'Enter the JIRA Ticket ID (e.g., QA-1321)'
        required: true
        type: string

jobs:
  generate-feature-file:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      models: read

    steps:

      # =========================================================
      # CHECKOUT
      # =========================================================
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          clean: true

      # =========================================================
      # CLEAN WORKSPACE
      # =========================================================
      - name: Ensure clean workspace
        run: |
          set -euo pipefail
          git clean -fd

      # =========================================================
      # INSTALL DEPENDENCIES
      # =========================================================
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================================================
      # BUILD AI CONTEXT FROM EXISTING FEATURE FILES
      # =========================================================
      - name: Build repository AI context
        run: |
          set -euo pipefail

          mkdir -p src/test/resources/features

          echo "Building reusable step dictionary..."

          find src/test/resources/features -name "*.feature" \
            -exec grep -hE "^\s*(Given|When|Then|And|But) " {} \; \
            | sed 's/^[ \t]*//' \
            | sort -u > step_dictionary.txt

          echo "Step dictionary size:"
          wc -l step_dictionary.txt

          echo "Building feature style examples..."

          rm -f feature_examples.txt

          find src/test/resources/features -name "*.feature" | head -10 | while read file; do
            echo "" >> feature_examples.txt
            echo "================ FEATURE EXAMPLE ================" >> feature_examples.txt
            cat "$file" >> feature_examples.txt
            echo "" >> feature_examples.txt
          done

          echo "Repository AI context prepared."

      # =========================================================
      # CREATE OR REUSE BRANCH
      # =========================================================
      - name: Create or reuse Jira branch
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin main

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null; then
            echo "Reusing branch: $BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git pull --rebase origin "$BRANCH"
          else
            echo "Creating branch: $BRANCH"
            git checkout -b "$BRANCH" origin/main
          fi

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # =========================================================
      # FETCH JIRA ISSUE
      # =========================================================
      - name: Fetch Jira Issue
        run: |
          set -euo pipefail

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2 | tr -d '[:space:]')

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Jira API failed with status $HTTP_STATUS"
            exit 1
          fi

          JSON=$(echo "$RESPONSE" | sed '$d')

          SUMMARY=$(echo "$JSON" | jq -r '.fields.summary // "NO_SUMMARY"')

          DESCRIPTION=$(echo "$JSON" \
            | jq -r '[.. | .text? // empty] | join(" ")' \
            | tr -d '\n\r')

          {
            echo "SUMMARY<<EOF"
            echo "$SUMMARY"
            echo "EOF"
          } >> $GITHUB_ENV

          {
            echo "DESCRIPTION<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"
          } >> $GITHUB_ENV

          echo "Fetched Jira summary:"
          echo "$SUMMARY"

      # =========================================================
      # GENERATE FEATURE FILE USING GITHUB MODELS
      # =========================================================
      - name: Generate Feature File using GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          echo "Building AI prompt..."

          cat <<EOF > prompt.txt
          You are a senior QA automation engineer.

          Your task is to generate a production-quality BDD Gherkin feature file.

          ==================================================
          JIRA INFORMATION
          ==================================================

          Jira ID:
          ${{ inputs.jira_id }}

          Jira Summary:
          ${{ env.SUMMARY }}

          Jira Description:
          ${{ env.DESCRIPTION }}

          ==================================================
          FEATURE STYLE REFERENCES
          ==================================================

          These are REAL feature files from the repository.

          Follow:
          - formatting
          - indentation
          - scenario structure
          - naming style
          - tagging style
          - wording patterns
          - repository conventions

          EOF

          cat feature_examples.txt >> prompt.txt

          cat <<EOF >> prompt.txt

          ==================================================
          REUSABLE STEP DICTIONARY
          ==================================================

          Reuse these exact steps whenever possible.

          Prefer existing repository steps over inventing new ones.

          EOF

          cat step_dictionary.txt >> prompt.txt

          cat <<EOF >> prompt.txt

          ==================================================
          IMPORTANT RULES
          ==================================================

          1. Generate meaningful automation-ready scenarios.
          2. Reuse repository step wording whenever possible.
          3. Only create new steps if absolutely necessary.
          4. Do NOT copy Jira text directly into steps.
          5. Convert Jira requirements into realistic user workflows.
          6. Follow repository formatting exactly.
          7. Return ONLY raw Gherkin syntax.
          8. No markdown.
          9. No explanations.

          EOF

          echo "Generating feature file from GitHub Models..."

          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -d "$(jq -n \
              --rawfile prompt prompt.txt \
              '{
                model: "gpt-4.1",
                temperature: 0.2,
                messages: [
                  {
                    role: "system",
                    content: "You generate enterprise-quality BDD feature files."
                  },
                  {
                    role: "user",
                    content: $prompt
                  }
                ]
              }')")

          echo "$RESPONSE" | jq -r '.choices[0].message.content' > generated.feature

          if [ ! -s generated.feature ]; then
            echo "❌ generated.feature is empty"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Generated feature file successfully."

      # =========================================================
      # SAVE GENERATED FEATURE FILE
      # =========================================================
      - name: Save generated feature file
        run: |
          set -euo pipefail

          TARGET_DIR="src/test/resources/features"

          mkdir -p "$TARGET_DIR"

          CLEAN_NAME=$(echo "${{ env.DESCRIPTION }}" \
            | head -c 80 \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/_/g' \
            | sed 's/__*/_/g' \
            | sed 's/^_//;s/_$//' \
            | cut -c1-60)

          if [ -z "$CLEAN_NAME" ]; then
            CLEAN_NAME="feature"
          fi

          FILE_NAME="${{ inputs.jira_id }}_${CLEAN_NAME}.feature"

          rm -f "$TARGET_DIR/${{ inputs.jira_id }}_"*.feature

          mv generated.feature "$TARGET_DIR/$FILE_NAME"

          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

          echo "--- GENERATED FEATURE FILE ---"
          cat "$TARGET_DIR/$FILE_NAME"

      # =========================================================
      # COMMIT AND PUSH
      # =========================================================
      - name: Commit and push changes
        run: |
          set -euo pipefail

          git add "${{ env.TARGET_DIR }}/${{ env.FILE_NAME }}"

          if git diff --cached --quiet; then
            echo "No changes detected."
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git commit -m "feat(${{ inputs.jira_id }}): generate BDD feature file"
            git push --force-with-lease origin "${{ env.BRANCH }}"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      # =========================================================
      # CREATE PULL REQUEST
      # =========================================================
      - name: Create Pull Request
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          EXISTING_PR=$(gh pr list \
            --head "${{ env.BRANCH }}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists"
            exit 0
          fi

          PR_BODY=$(cat <<EOF
          Auto-generated BDD feature file from Jira ticket.

          Jira ID: ${{ inputs.jira_id }}
          Summary: ${{ env.SUMMARY }}

          Generated using:
          - Existing repository feature file patterns
          - Existing repository step dictionary
          - Jira description semantic analysis

          Only the generated feature file is included in this PR.
          EOF
          )

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): ${{ env.SUMMARY }}" \
            --body "$PR_BODY"
