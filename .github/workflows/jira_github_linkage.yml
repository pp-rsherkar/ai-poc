name: JIRA GITHUB Linkage Feature Generator

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: 'Enter the JIRA Ticket ID (e.g., QA-1321)'
        required: true
        type: string

jobs:
  generate-feature-file:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      # =========================
      # CLEAN CHECKOUT
      # =========================
      - name: Checkout main (clean)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          clean: true

      - name: Ensure clean workspace
        run: git clean -fd

      # =========================
      # STEP INDEX (Your Dictionary)
      # =========================
      - name: Build step index from main
        run: |
          echo "Building step index..."
          # Extracts clean, unique step phrases from existing feature files
          find src/test/resources/features -name "*.feature" -exec grep -E "^\s*(Given|When|Then|And|But) " {} \; \
            | sed -e 's/^[ \t]*//' \
            | sort | uniq > step_dictionary.txt
          echo "Dictionary built with $(wc -l < step_dictionary.txt) steps."

      # =========================
      # BRANCH HANDLING
      # =========================
      - name: Create or reuse Jira branch
        run: |
          BRANCH="${{ inputs.jira_id }}"
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin main

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git pull --rebase origin "$BRANCH"
          else
            git checkout -b "$BRANCH" origin/main
          fi
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # =========================
      # JIRA FETCH
      # =========================
      - name: Fetch Jira Issue
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2 | tr -d '[:space:]')
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Jira API failed with status $HTTP_STATUS"
            exit 1
          fi

          JSON=$(echo "$RESPONSE" | sed '$d')
          SUMMARY=$(echo "$JSON" | jq -r '.fields.summary // "NO_SUMMARY"')
          DESCRIPTION=$(echo "$JSON" | jq -r '[.. | .text? // empty] | join(" ")' | tr -d '\n\r')

          echo "SUMMARY=$SUMMARY" >> $GITHUB_ENV
          echo "$DESCRIPTION" > jira_description.txt

      # =========================
      # ROBUST COPILOT LLM GENERATION
      # =========================
      - name: Generate Feature File via GitHub Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Initializing Copilot integration..."
          gh extension install github/gh-copilot || true
          
          # Prepare text blocks safely
          DICT=$(cat step_dictionary.txt)
          JIRA_DESC=$(cat jira_description.txt)
          
          # Create a structural system prompt instructing Copilot on how to write code
          cat << EOF > prompt.txt
          You are a strict QA automation engineer. Generate a BDD Gherkin .feature file for Jira Ticket ${{ inputs.jira_id }}.
          
          Jira Summary: ${{ env.SUMMARY }}
          Jira Description: $JIRA_DESC
          
          CRITICAL INSTRUCTIONS:
          1. Review the existing repository steps dictionary below. 
          2. Do NOT copy the Jira description sentence directly into the Given/When/Then lines. 
          3. Convert the description into logical user actions (e.g., Given the user navigates to workspace, When the user schedules a creative without a line item flight, Then an error message should display). Match your phrase structure to the existing dictionary style where possible.
          4. Output ONLY the raw Gherkin text. No markdown code blocks, no backticks, no talkback prose. Start directly with "Feature:".

          Repository Steps Dictionary:
          $DICT
          EOF

          # Call the copilot CLI to compute the result safely
          gh copilot explain "Generate Gherkin feature file based on prompt.txt instructions" --prompt "$(cat prompt.txt)" > generated_raw.txt
          
          # Clean any stray markdown artifacts if returned
          cat generated_raw.txt | sed '/^```/d' > generated.feature

      # =========================
      # SINGLE FILE NAMING & PLACEMENT
      # =========================
      - name: Save and Name Feature File
        run: |
          RAW_DESC_SNIPPET=$(cat jira_description.txt | head -c 40)
          CLEAN_DESC=$(echo "$RAW_DESC_SNIPPET" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/_/g' \
            | sed 's/__*/_/g' \
            | sed 's/^_//;s/_$//')

          if [ -z "$CLEAN_DESC" ]; then CLEAN_DESC="feature"; fi

          FILE_NAME="${{ inputs.jira_id }}_${CLEAN_DESC}.feature"
          TARGET_DIR="src/test/resources/features"
          
          # Clean up any residual old feature files on this branch to keep the PR pristine
          rm -rf $TARGET_DIR/${{ inputs.jira_id }}_*.feature
          mkdir -p "$TARGET_DIR"

          mv generated.feature "$TARGET_DIR/$FILE_NAME"
          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

      # =========================
      # SAFE COMMIT & PR PUSH
      # =========================
      - name: Commit and push changes
        run: |
          git add "${{ env.TARGET_DIR }}/${{ env.FILE_NAME }}"
          
          # Check if there are real changes to commit
          if git diff --cached --quiet; then
            echo "No variations detected."
          else
            git commit -m "feat(${{ inputs.jira_id }}): generate tailored BDD feature file"
            git push --force-with-lease origin "${{ env.BRANCH }}"
          fi

      # =========================
      # SMART PR UPDATE OR CREATE
      # =========================
      - name: Create or Update Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --head "${{ env.BRANCH }}" --base main --state open --json number --jq '.[0].number')
          PR_TITLE="feat(${{ inputs.jira_id }}): ${{ env.SUMMARY }}"
          PR_BODY="Auto-generated smart BDD feature file matched against existing repository patterns.\n\n**Jira ID:** ${{ inputs.jira_id }}"

          if [ -n "$EXISTING_PR" ]; then
            echo "Updating existing PR #$EXISTING_PR"
            gh pr edit "$EXISTING_PR" --title "$PR_TITLE" --body "$PR_BODY"
          else
            echo "Creating a new PR"
            gh pr create --base main --head "${{ env.BRANCH }}" --title "$PR_TITLE" --body "$PR_BODY"
          fi
