name: JIRA GITHUB Linkage Feature Generator

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., QA-1321)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-feature-file:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # CHECKOUT
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # CLEAN WORKSPACE
      # =========================
      - name: Prepare workspace
        run: |
          set -euo pipefail
          git clean -fd

      # =========================
      # JQ INSTALL
      # =========================
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # BUILD CONTEXT (LIGHTWEIGHT)
      # =========================
      - name: Build AI context
        run: |
          set -euo pipefail

          mkdir -p src/test/resources/features

          # step dictionary (small + relevant only)
          find src/test/resources/features -name "*.feature" \
            -exec grep -hE "^\s*(Given|When|Then|And|But) " {} \; \
            > raw_steps.txt || true
          
          if [ -s raw_steps.txt ]; then
            LC_ALL=C sort -u raw_steps.txt > sorted_steps.txt
          else
            echo "" > sorted_steps.txt
          fi
          
          head -n 200 sorted_steps.txt > step_dictionary.txt

      # =========================
      # CREATE BRANCH (FIXED)
      # =========================
      - name: Create branch
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin

          git checkout -B "$BRANCH"

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # =========================
      # FETCH JIRA
      # =========================
      - name: Fetch Jira
        run: |
          set -euo pipefail

          RESPONSE=$(curl -s \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary')

          DESCRIPTION=$(echo "$RESPONSE" \
            | jq -r '[.. | .text? // empty] | join(" ")' \
            | head -c 1200)

          echo "SUMMARY=$SUMMARY" >> $GITHUB_ENV
          echo "DESCRIPTION=$DESCRIPTION" >> $GITHUB_ENV

      # =========================
      # GENERATE FEATURE (SAFE PROMPT)
      # =========================
      - name: Generate feature via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          cat <<EOF > prompt.txt
          You are a Senior QA Automation Engineer working on a mature BDD (Cucumber/Gherkin) automation framework.
          
          Your task is to generate a production-quality, automation-ready Gherkin feature file based on Jira requirements and existing repository patterns.
          
          ==================================================
          JIRA CONTEXT
          ==================================================
          
          ID:
          ${{ inputs.jira_id }}
          
          SUMMARY:
          $SUMMARY
          
          DESCRIPTION:
          $DESCRIPTION
          
          ==================================================
          REPOSITORY CONTEXT (MOST IMPORTANT)
          ==================================================
          
          You MUST strictly follow existing repository feature file patterns.
          
          Use:
          - step_dictionary.txt for step reuse
          - existing scenario structures
          - existing tagging style
          - existing background patterns
          - existing test data patterns
          
          Do NOT introduce new patterns unless absolutely necessary.
          
          ==================================================
          CRITICAL OUTPUT RULES
          ==================================================
          
          - Output ONLY raw Gherkin
          - NO markdown
          - NO ``` fences
          - NO explanations
          - NO commentary
          - NO extra text outside feature file
          
          ==================================================
          SCENARIO RULE (MANDATORY)
          ==================================================
          
          Every Scenario MUST start with:
          @todo
          
          Example:
          @todo
          Scenario: Validate user behavior
          
          ==================================================
          LOGIN / NAVIGATION RULES
          ==================================================
          
          If repository contains login/navigation steps:
          - Reuse them exactly from step_dictionary.txt
          Example:
            Given user is logged in as "<role>"
            And user navigates to "<page>"
          
          If NOT present in repository:
          - Assume user is already authenticated
          - DO NOT invent login flows
          
          ==================================================
          TEST DATA USAGE RULES (3 LEVEL MODEL)
          ==================================================
          
          You MUST decide test-data format based on repository patterns:
          
          --------------------------------------------------
          1. STEP-LEVEL TEST DATA (PREFERRED IF AVAILABLE)
          --------------------------------------------------
          Use inline values inside steps when repo uses it.
          
          Example:
          Given a tactic with 3 creatives
          And schedule is active for all creatives
          
          --------------------------------------------------
          2. CUCUMBER DATA TABLES (ONLY IF REPO USES THEM)
          --------------------------------------------------
          Use ONLY if similar structure exists in repository.
          
          Example:
          Given a tactic exists with:
            | creatives | 3 |
            | schedule  | active |
          
          Rules:
          - Do NOT introduce tables if repo does not already use them
          - Keep tables minimal and readable
          
          --------------------------------------------------
          3. SCENARIO OUTLINE / EXAMPLES (ONLY IF PATTERN EXISTS)
          --------------------------------------------------
          Use Scenario Outline ONLY if repository already uses it.
          
          Example:
          Scenario Outline: Validate scheduling for different creatives
            Given a tactic with "<creative_count>" creatives
            When scheduling is applied
            Then system validates "<expected_result>"
          
            Examples:
              | creative_count | expected_result |
              | 1              | success         |
              | 5              | warning         |
          
          ==================================================
          STEP REUSE RULE (STRICT)
          ==================================================
          
          Before writing any step:
          - Check step_dictionary.txt first
          - Prefer exact match reuse
          - Only create new steps if no match exists
          
          ==================================================
          SCENARIO DESIGN PRINCIPLES
          ==================================================
          
          Each scenario must:
          - Represent ONE business behavior
          - Be independent and executable
          - Include meaningful validation
          - Avoid duplication
          - Include positive + negative coverage where relevant
          
          ==================================================
          TAGGING RULES
          ==================================================
          
          - Every Scenario MUST start with @todo
          - Reuse existing tags from repository if present
          - Do NOT invent new tag taxonomy
          
          ==================================================
          BACKGROUND RULES
          ==================================================
          
          Include Background ONLY if repository shows consistent usage.
          Otherwise omit it.
          
          ==================================================
          FEATURE QUALITY RULES
          ==================================================
          
          Ensure:
          - Automation-ready structure
          - Clean Gherkin formatting
          - No redundant scenarios
          - Business logic accuracy
          - Proper reuse of repository patterns
          
          ==================================================
          FINAL OUTPUT FORMAT (STRICT)
          ==================================================
          
          Feature: <Feature Name>
          
          Background:
            ...
          
          @todo
          Scenario: <Scenario Name>
            Given ...
            When ...
            Then ...
          
          EOF
          
                    head -n 200 step_dictionary.txt >> prompt.txt
          
                    jq -n \
                      --rawfile prompt prompt.txt \
                      '{
                        model: "gpt-4.1-mini",
                        temperature: 0.2,
                        messages: [
                          { role: "system", content: "Return ONLY raw Gherkin." },
                          { role: "user", content: $prompt }
                        ]
                      }' > request.json
          
                    RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
                      -H "Content-Type: application/json" \
                      -H "Authorization: Bearer $GITHUB_TOKEN" \
                      --data @request.json)
          
                    FEATURE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')
          
                    # IMPORTANT: remove markdown fences if model adds them
                    FEATURE=$(echo "$FEATURE" | sed 's/```gherkin//g' | sed 's/```//g')
          
                    echo "$FEATURE" > generated.feature

      # =========================
      # SAVE FILE
      # =========================
      - name: Save feature file
        run: |
          set -euo pipefail
          
          DIR="src/test/resources/features"
          mkdir -p "$DIR"
          
          FILE="${{ inputs.jira_id }}.feature"
          
          mv generated.feature "$DIR/$FILE"
          
          echo "FILE=$FILE" >> $GITHUB_ENV
          echo "DIR=$DIR" >> $GITHUB_ENV
          
          echo "Adding @todo tags to scenarios..."
          
          awk '
          /^  Scenario:/ {print "  @todo"}
          {print}
          ' "$DIR/$FILE" > "$DIR/tmp.feature" && mv "$DIR/tmp.feature" "$DIR/$FILE"
          
          echo "--- FINAL FEATURE FILE ---"
          cat "$DIR/$FILE"

      # =========================
      # COMMIT + FORCE PUSH (FIXED)
      # =========================
      - name: Commit & push (overwrite branch)
        run: |
          set -euo pipefail

          git add "$DIR/$FILE"

          git commit -m "feat(${{ inputs.jira_id }}): generate feature file" || true

          # FORCE OVERWRITE (your requirement)
          git push origin "${{ env.BRANCH }}" --force

      # =========================
      # PR (FIXED - NEVER mainâ†’main)
      # =========================
      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR=$(gh pr list \
            --head "${{ env.BRANCH }}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR" ]; then
            echo "PR already exists"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): $SUMMARY" \
            --body "Auto-generated BDD feature file"
