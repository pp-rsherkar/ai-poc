name: JIRA GHERKIN Generator (Production Ready)

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., QA-1321)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Install dependencies
      # =========================
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # Build repository AI context
      # =========================
      - name: Build AI context
        run: |
          set -euo pipefail

          mkdir -p src/test/resources/features

          if find src/test/resources/features -name "*.feature" | read; then
            find src/test/resources/features -name "*.feature" \
              -exec grep -hE "^\s*(Given|When|Then|And|But) " {} \; \
              2>/dev/null \
              | sort -u \
              | head -n 200 > step_dictionary.txt || true
          else
            touch step_dictionary.txt
          fi

      # =========================
      # Create branch
      # =========================
      - name: Create branch
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin || true
          git checkout -B "$BRANCH"

          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      # =========================
      # Fetch Jira
      # =========================
      - name: Fetch Jira
        run: |
          set -euo pipefail

          RESPONSE=$(curl -s \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          if echo "$RESPONSE" | jq -e '.errorMessages' >/dev/null; then
            echo "Failed to fetch Jira issue"
            echo "$RESPONSE"
            exit 1
          fi

          SUMMARY=$(echo "$RESPONSE" | jq -r '
            .fields.summary // "No Summary"
          ')

          DESCRIPTION=$(echo "$RESPONSE" | jq -r '
            .fields.description
            | .. | .text? // empty
          ' | tr '\n' ' ' | sed 's/  */ /g' | head -c 3000)

          COMMENTS=$(echo "$RESPONSE" | jq -r '
            .fields.comment.comments
            | sort_by(.created)
            | reverse
            | .[:5]
            | reverse
            | .[]
            | (
                .author.displayName // "Unknown"
              ) + ": " + (
                .body
                | .. | .text? // empty
              )
          ' | tr '\n' ' ' | sed 's/  */ /g' | head -c 4000)

          [ -z "$DESCRIPTION" ] && DESCRIPTION="No Description"
          [ -z "$COMMENTS" ] && COMMENTS="No Comments"

          {
            echo "SUMMARY<<EOF"
            echo "$SUMMARY"
            echo "EOF"

            echo "DESCRIPTION<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"

            echo "COMMENTS<<EOF"
            echo "$COMMENTS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # =========================
      # Generate feature
      # =========================
      - name: Generate feature via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          STEP_CONTEXT=$(head -n 150 step_dictionary.txt)

          cat <<EOF > prompt.txt
          You are a Senior QA Automation Engineer working in a mature Cucumber BDD framework.
          
          Please understand and learn the way all feature files are created in our project.
          
          Carefully analyze:
          - Existing feature structure
          - Step wording
          - Naming conventions
          - Scenario patterns
          - Tagging strategy
          - Data handling style
          - Reusable steps
          - Formatting consistency
          
          Then go through the Jira requirement below and generate production-quality Gherkin feature files and scenarios that match the repository standards exactly.
          
          ==================================================
          CRITICAL OUTPUT RULES
          ==================================================
          - Output ONLY raw Gherkin
          - No markdown
          - No code fences
          - No explanations
          - Use existing steps whenever possible
          - Do NOT repeat scenario headers
          - Do NOT add placeholders
          - Output clean Gherkin only
          - Always convert into natural language feature names
          - Always prefix every scenario definition with the @todo annotation tag
          
          ==================================================
          JIRA
          ==================================================
          ID:
          ${{ inputs.jira_id }}
          
          SUMMARY:
          $SUMMARY
          
          DESCRIPTION:
          $DESCRIPTION
          
          COMMENTS:
          $COMMENTS
          
          ==================================================
          REPOSITORY STEPS
          ==================================================
          $STEP_CONTEXT
          
          ==================================================
          TEST DATA RULES
          ==================================================
          
          Priority order:
          1. Inline data
          2. Data tables
          3. Scenario Outline
          
          Use Scenario Outline ONLY if Jira explicitly contains permutations.
          
          Reuse existing repository steps whenever possible.
          
          Do not invent authentication flows.
          
          ==================================================
          OUTPUT FORMAT
          ==================================================
          Feature: <name>
          
          EOF

          jq -n \
            --rawfile prompt prompt.txt \
            '{
              model: "gpt-4.1-mini",
              temperature: 0.2,
              messages: [
                {
                  role: "system",
                  content: "Return ONLY valid Gherkin."
                },
                {
                  role: "user",
                  content: $prompt
                }
              ]
            }' > request.json

          RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            --data @request.json)

          FEATURE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          FEATURE=$(echo "$FEATURE" \
            | sed 's/```gherkin//g' \
            | sed 's/```//g')

          if [ -z "$FEATURE" ]; then
            echo "Model returned empty feature file"
            echo "$RESPONSE"
            exit 1
          fi

          echo "$FEATURE" > generated.feature

      # =========================
      # Save feature file
      # =========================
      - name: Save feature file
        run: |
          set -euo pipefail

          DIR="src/test/resources/features"
          FILE="${{ inputs.jira_id }}.feature"

          mkdir -p "$DIR"

          awk '
          /^Scenario:/ {
            print "@todo"
          }
          {
            print
          }
          ' generated.feature \
          | awk '!seen[$0]++ || $0 != "@todo"' \
          > "$DIR/$FILE"

          if [ ! -s "$DIR/$FILE" ]; then
            echo "Generated feature file is empty"
            exit 1
          fi

          echo "DIR=$DIR" >> "$GITHUB_ENV"
          echo "FILE=$FILE" >> "$GITHUB_ENV"

      # =========================
      # Commit and push
      # =========================
      - name: Commit & push
        run: |
          set -euo pipefail

          git add "$DIR/$FILE"

          git commit -m "feat(${{ inputs.jira_id }}): generate feature file" || true

          git push origin "${{ env.BRANCH }}" --force

      # =========================
      # Create PR
      # =========================
      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR=$(gh pr list \
            --head "${{ env.BRANCH }}" \
            --base main \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR" ]; then
            echo "PR already exists"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): $SUMMARY" \
            --body "Auto-generated BDD feature file from Jira"
