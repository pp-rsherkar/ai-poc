name: JIRA GHERKIN Generator (Production Ready)

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., QA-1321)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    env:
      FEATURE_DIR: src/test/resources/features

    steps:

      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # Build reusable step dictionary
      # =========================
      - name: Build AI repository context
        run: |
          set -euo pipefail

          mkdir -p "$FEATURE_DIR"

          if find "$FEATURE_DIR" -name "*.feature" | read; then
            find "$FEATURE_DIR" -name "*.feature" \
              -exec grep -hE "^\s*(Given|When|Then|And|But) " {} \; \
              2>/dev/null \
              | sed 's/^[[:space:]]*//g' \
              | sort -u \
              | head -n 300 \
              > step_dictionary.txt || true
          else
            touch step_dictionary.txt
          fi

      # =========================
      # Create working branch
      # =========================
      - name: Create branch
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin || true
          git checkout -B "$BRANCH"

          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      # =========================
      # Fetch Jira
      # =========================
      - name: Fetch Jira details
        run: |
          set -euo pipefail

          echo "Fetching Jira issue: ${{ inputs.jira_id }}"

          RESPONSE=$(curl -s \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          # Validate Jira response
          if echo "$RESPONSE" | jq -e '.errorMessages' >/dev/null; then
            echo "Jira API returned an error:"
            echo "$RESPONSE"
            exit 1
          fi

          # =========================
          # Summary
          # =========================
          SUMMARY=$(echo "$RESPONSE" | jq -r '
            .fields.summary // "No Summary"
          ')

          # =========================
          # Full Description (ADF safe)
          # =========================
          DESCRIPTION=$(echo "$RESPONSE" | jq -r '
            .fields.description
            | .. | .text? // empty
          ' | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g')

          # =========================
          # Full Comments (ADF safe)
          # =========================
          COMMENTS=$(echo "$RESPONSE" | jq -r '
            .fields.comment.comments
            | sort_by(.created)
            | .[]
            | (
                .author.displayName // "Unknown"
              ) + ": " + (
                .body
                | .. | .text? // empty
              )
          ' | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g')

          # Fallbacks
          [ -z "$DESCRIPTION" ] && DESCRIPTION="No Description"
          [ -z "$COMMENTS" ] && COMMENTS="No Comments"

          {
            echo "SUMMARY<<EOF"
            echo "$SUMMARY"
            echo "EOF"

            echo "DESCRIPTION<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"

            echo "COMMENTS<<EOF"
            echo "$COMMENTS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # =========================
      # Generate Feature File
      # =========================
      - name: Generate feature via GitHub Models
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          STEP_CONTEXT=$(head -n 200 step_dictionary.txt)

          cat <<EOF > prompt.txt
          You are a Senior QA Automation Engineer working in a mature Cucumber BDD framework.
          
          Please understand and learn the way all feature files are created in our project.
          
          Carefully analyze:
          - Existing feature structure
          - Step wording
          - Naming conventions
          - Scenario patterns
          - Tagging strategy
          - Data handling style
          - Reusable steps
          - Formatting consistency
          
          Then go through the Jira requirement below and generate production-quality Gherkin feature files and scenarios that match the repository standards exactly.
          
          ==================================================
          CRITICAL OUTPUT RULES
          ==================================================
          
          - Output ONLY raw Gherkin
          - No markdown
          - No code fences
          - No explanations
          - No notes
          - Use existing repository steps whenever possible
          - Do NOT repeat scenario headers
          - Do NOT add placeholders
          - Do NOT invent unnecessary steps
          - Always convert Jira language into natural feature names
          - Always prefix every Scenario or Scenario Outline with @todo
          - Keep scenarios concise and production realistic
          - Follow existing repository conventions strictly
          
          ==================================================
          JIRA DETAILS
          ==================================================
          
          ID:
          ${{ inputs.jira_id }}
          
          SUMMARY:
          $SUMMARY
          
          DESCRIPTION:
          $DESCRIPTION
          
          COMMENTS:
          $COMMENTS
          
          ==================================================
          REPOSITORY STEP LIBRARY
          ==================================================
          
          $STEP_CONTEXT
          
          ==================================================
          TEST DATA RULES
          ==================================================
          
          Priority order:
          1. Inline data
          2. Data tables
          3. Scenario Outline
          
          Use Scenario Outline ONLY when Jira explicitly contains permutations or repeated validation combinations.
          
          Use Data Tables ONLY when structured entity attributes are required.
          
          Prefer reusable repository wording over generating new steps.
          
          Do not invent authentication or setup flows unless repository patterns clearly require them.
          
          ==================================================
          OUTPUT FORMAT
          ==================================================
          
          Feature: <name>
          
          EOF

          jq -n \
            --rawfile prompt prompt.txt \
            '{
              model: "gpt-4.1-mini",
              temperature: 0.2,
              messages: [
                {
                  role: "system",
                  content: "Return ONLY valid raw Gherkin."
                },
                {
                  role: "user",
                  content: $prompt
                }
              ]
            }' > request.json

          RESPONSE=$(curl -s \
            https://models.inference.ai.azure.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            --data @request.json)

          FEATURE=$(echo "$RESPONSE" | jq -r '
            .choices[0].message.content // empty
          ')

          # Cleanup accidental markdown
          FEATURE=$(echo "$FEATURE" \
            | sed 's/```gherkin//g' \
            | sed 's/```//g')

          # Validate output
          if [ -z "$FEATURE" ]; then
            echo "Model returned empty output"
            echo "$RESPONSE"
            exit 1
          fi

          echo "$FEATURE" > generated.feature

      # =========================
      # Save feature file
      # =========================
      - name: Save feature file
        run: |
          set -euo pipefail

          FILE="${{ inputs.jira_id }}.feature"

          mkdir -p "$FEATURE_DIR"

          awk '
          /^Scenario:|^Scenario Outline:/ {
            print "@todo"
          }
          {
            print
          }
          ' generated.feature > "$FEATURE_DIR/$FILE"

          if [ ! -s "$FEATURE_DIR/$FILE" ]; then
            echo "Generated feature file is empty"
            exit 1
          fi

          echo "FILE=$FILE" >> "$GITHUB_ENV"

      # =========================
      # Commit and push
      # =========================
      - name: Commit & push
        run: |
          set -euo pipefail

          git add "$FEATURE_DIR/${{ env.FILE }}"

          git commit -m "feat(${{ inputs.jira_id }}): generate feature file" || true

          git push origin "${{ env.BRANCH }}" --force

      # =========================
      # Create PR
      # =========================
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          PR_NUMBER=$(gh pr list \
            --head "${{ env.BRANCH }}" \
            --base main \
            --json number \
            --jq '.[0].number')

          if [ -n "$PR_NUMBER" ]; then
            echo "Pull Request already exists"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): $SUMMARY" \
            --body "Auto-generated BDD feature file from Jira"
