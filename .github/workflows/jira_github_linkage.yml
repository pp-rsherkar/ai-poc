name: JIRA GITHUB Linkage Feature Generator

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter Jira Ticket ID (e.g., QA-1321)"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  models: read

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    steps:

      # =========================
      # Checkout
      # =========================
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Install jq
      # =========================
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq

      # =========================
      # Build AI context (SAFE + SMALL)
      # =========================
      - name: Build step dictionary + examples
        run: |
          mkdir -p src/test/resources/features

          find src/test/resources/features -name "*.feature" \
            -exec grep -hE "^\s*(Given|When|Then|And|But) " {} \; \
            | sort -u > step_dictionary.txt

          find src/test/resources/features -name "*.feature" | head -n 5 > feature_files.txt

      # =========================
      # Fetch Jira
      # =========================
      - name: Fetch Jira Issue
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
        run: |
          RESPONSE=$(curl -s \
            -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "$JIRA_BASE_URL/rest/api/3/issue/${{ inputs.jira_id }}")

          SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary')
          DESCRIPTION=$(echo "$JSON" | jq -r '
            def extract_text:
              .. | objects | .text? // empty;
          
            [extract_text] | join(" ")
          ' | tr -d '\n\r')
          
          DESCRIPTION=$(echo "$DESCRIPTION" | head -c 1200)

          echo "SUMMARY=$SUMMARY" >> $GITHUB_ENV
          echo "DESCRIPTION=$DESCRIPTION" >> $GITHUB_ENV

      # =========================
      # Generate Feature via GitHub Models
      # =========================
      - name: Generate Feature File
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          DESC_TRIM=$(echo "$DESCRIPTION" | head -c 1200)

          cat <<EOF > prompt.txt
          You are a senior QA automation engineer.
          
          Generate a clean BDD Gherkin feature file.
          
          RULES:
          - Use existing repository step style
          - Do not invent unnecessary steps
          - Do not copy Jira text directly
          - Keep scenarios realistic and automation ready
          - Output ONLY raw Gherkin

          JIRA:
          ID: ${{ inputs.jira_id }}
          SUMMARY: $SUMMARY
          
          DESCRIPTION:
          $DESC_TRIM
          
          EXISTING STEPS:
          EOF
          
                    head -n 120 step_dictionary.txt >> prompt.txt
          
                    jq -n \
                      --rawfile prompt prompt.txt \
                      '{
                        model: "gpt-4.1",
                        temperature: 0.2,
                        messages: [
                          { role: "system", content: "You generate enterprise BDD feature files." },
                          { role: "user", content: $prompt }
                        ]
                      }' > request.json

                    set -e
                    RESPONSE=$(curl -s https://models.inference.ai.azure.com/chat/completions \
                      -H "Content-Type: application/json" \
                      -H "Authorization: Bearer $GITHUB_TOKEN" \
                      --data @request.json)
                    set -e  
          
                    echo "$RESPONSE"

                    FEATURE=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

                    if [ -z "$FEATURE" ] || [ "$FEATURE" = "null" ]; then
                      echo "RAW RESPONSE:"
                      echo "$RESPONSE"
                      exit 1
                    fi
          
                    echo "$FEATURE" > generated.feature

      # =========================
      # Save Feature File (SMART NAMING)
      # =========================
      - name: Save Feature File
        run: |
          mkdir -p src/test/resources/features

          CLEAN_NAME=$(echo "$DESCRIPTION" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/_/g' \
            | sed 's/_\+/_/g' \
            | cut -c1-60)

          [ -z "$CLEAN_NAME" ] && CLEAN_NAME="feature"

          FILE="src/test/resources/features/${{ inputs.jira_id }}_${CLEAN_NAME}.feature"

          mv generated.feature "$FILE"

          echo "FILE=$FILE" >> $GITHUB_ENV

      # =========================
      # Commit
      # =========================
      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add "$FILE"

          git commit -m "feat(${{ inputs.jira_id }}): generate BDD feature" || echo "No changes"
          git push origin HEAD

      # =========================
      # PR Creation
      # =========================
      - name: Create PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "feat(${{ inputs.jira_id }}): $SUMMARY" \
            --body "Auto-generated BDD feature file from Jira"
