name: E2E Playwright Tests

# Runs the Cucumber/Playwright @e2e suite. On failure, uploads Cucumber reports,
# Playwright traces and screenshots, then opens (or updates) a GitHub Issue
# assigned to @copilot so the Copilot coding agent — which has access to this
# repository through the GitHub MCP server — can read the failure, propose a
# fix, and open a Pull Request automatically.

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Cucumber tag expression to run (default: @e2e)"
        required: false
        default: "@e2e"
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 02:00 UTC
    - cron: "0 2 * * *"

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Run @e2e Cucumber suite
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CUCUMBER_TAGS: ${{ github.event.inputs.tags || '@e2e' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Resolve Maven dependencies
        run: mvn -B -ntp -DskipTests dependency:go-offline

      - name: Install Playwright browsers (with OS deps)
        run: mvn -B -ntp exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps"

      - name: Run Cucumber tests
        id: tests
        run: mvn -B -ntp -Dtest=TestRunner -Dcucumber.filter.tags="${{ env.CUCUMBER_TAGS }}" test

      - name: Upload Cucumber reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: |
            target/cucumber-reports/**
            target/failed_scenarios.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces & screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            target/trace_*.zip
            target/*.png
          if-no-files-found: ignore
          retention-days: 14

      - name: Open / update test-failure issue for Copilot
        if: failure() && github.event_name != 'pull_request'
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            let failed = '';
            try {
              failed = fs.readFileSync('target/failed_scenarios.txt', 'utf8').trim();
            } catch (_) {
              failed = '(failed_scenarios.txt not produced — see run logs)';
            }

            const title = `E2E failure on ${process.env.REF} @ ${process.env.SHA.slice(0, 7)}`;
            const body = [
              `Automated failure report from workflow run: ${process.env.RUN_URL}`,
              '',
              '### Failing scenarios',
              '```',
              failed || '(none recorded)',
              '```',
              '',
              '### Artifacts',
              '- `cucumber-reports` — HTML/JSON/JUnit reports',
              '- `playwright-traces` — `trace_*.zip` and failure screenshots',
              '',
              '### Next step',
              'Copilot, please:',
              '1. Use the GitHub MCP server to fetch the failing job logs and artifacts for this run.',
              '2. Reproduce the failure locally (the `copilot-setup-steps` workflow pre-installs JDK 21, Maven deps, and Playwright browsers in your sandbox).',
              '3. Edit the affected page object / step definition / feature, run `mvn -B -Dtest=TestRunner -Dcucumber.filter.tags="@e2e" test`, run `mvn spotless:apply`, and open a PR that fixes `Fixes #<this-issue>`.',
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-failure',
              per_page: 50,
            });

            const match = existing.find((i) => i.title === title);
            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Re-occurred on run ${process.env.RUN_URL}`,
              });
              core.info(`Updated existing issue #${match.number}`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['test-failure', 'copilot'],
              assignees: ['copilot'],
            });
            core.info(`Created issue #${created.data.number}`);
