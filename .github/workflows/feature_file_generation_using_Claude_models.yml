name: JIRA - Feature File (GHERKIN) Generator Using CLAUDE

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., QA-1321)"
        required: true
        type: string

      domain:
        description: "Target domain/sub-folder"
        required: true
        type: choice
        default: "life"
        options: [life, studio, hcp]

      llm_model:
        description: "Select Claude Model"
        required: true
        type: choice
        default: "claude-sonnet-4-6"
        options:
          - claude-haiku-4-5
          - claude-sonnet-4-6
          - claude-opus-4-8
          - claude-opus-4-7
          - claude-opus-4-6

permissions:
  contents: write
  pull-requests: write

env:
  FEATURE_DIR: src/test/resources/features

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      # ---------------------------
      # Dependencies
      # ---------------------------
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      # ---------------------------
      # Build context (Python file instead of heredoc logic inside YAML)
      # ---------------------------
      - name: Build AI repository context
        run: |
          set -euo pipefail
          mkdir -p "$FEATURE_DIR"
      
          cat > /tmp/build_context.py << 'PYEOF'
          import os, glob, re
          from collections import defaultdict
          
          feature_dir = os.environ.get("FEATURE_DIR", "src/test/resources/features")
          
          steps_by_domain = defaultdict(set)
          scenarios = []
          
          for file_path in glob.glob(f"{feature_dir}/**/*.feature", recursive=True):
              domain = os.path.basename(os.path.dirname(file_path))
              if domain in ["features", ""]:
                  domain = "general"
          
              with open(file_path, "r", encoding="utf-8") as f:
                  content = f.read()
          
              for match in re.finditer(r'^\s*(Scenario|Scenario Outline):\s*(.+)', content, re.MULTILINE):
                  scenarios.append(f"[{domain}] {match.group(0).strip()}")
          
              for line in content.split("\n"):
                  line = line.strip()
                  if re.match(r'^(Given|When|Then|And|But)\s+', line):
                      steps_by_domain[domain].add(line)
          
          with open("step_dictionary.txt", "w", encoding="utf-8") as f:
              for domain, steps in sorted(steps_by_domain.items()):
                  f.write(f"\n--- Domain: {domain} ---\n")
                  f.write("\n".join(sorted(steps)))
                  f.write("\n")
          
          with open("scenario_dictionary.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(scenarios))
          
          print("Domains found:", sorted(steps_by_domain.keys()))
          print("Total steps:", sum(len(v) for v in steps_by_domain.values()))
          print("Total scenarios:", len(scenarios))
          PYEOF
      
          python3 /tmp/build_context.py
      
          echo "Step dictionary  : $(wc -l < step_dictionary.txt) lines"
          echo "Scenario dict    : $(wc -l < scenario_dictionary.txt) lines"

      # ---------------------------
      # Create branch
      # ---------------------------
      - name: Create branch
        run: |
          set -euo pipefail
          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin main
          git checkout -b "$BRANCH" origin/main || git checkout "$BRANCH"

          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      # ---------------------------
      # Jira fetch
      # ---------------------------
      - name: Fetch Jira details
        run: |
          set -euo pipefail

          RESPONSE=$(curl -s --fail \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          echo "$RESPONSE" > jira_response.json

      # ---------------------------
      # Parse Jira fields (ADF-aware)
      # ---------------------------
      - name: Parse Jira fields
        run: |
          set -euo pipefail
          python3 - << 'PYEOF'
import json, os

def extract_adf_text(node):
    if not isinstance(node, dict):
        return ""
    text = ""
    node_type = node.get("type", "")
    if node_type == "text":
        return node.get("text", "")
    block_types = {"paragraph", "heading", "bulletList",
                   "orderedList", "listItem", "blockquote",
                   "codeBlock", "panel", "rule", "mediaGroup"}
    for child in node.get("content", []):
        text += extract_adf_text(child)
    if node_type in block_types:
        text += "\n"
    return text

with open("jira_response.json", "r", encoding="utf-8") as f:
    data = json.load(f)

fields      = data.get("fields", {})
summary     = fields.get("summary", "No Summary")[:300]
desc_node   = fields.get("description") or {}
description = extract_adf_text(desc_node).strip()[:12000]

comments_parts = []
for c in fields.get("comment", {}).get("comments", []):
    body = c.get("body") or {}
    comments_parts.append(extract_adf_text(body).strip())
comments = "\n".join(comments_parts)[:8000]

with open("jira_fields.env", "w", encoding="utf-8") as f:
    f.write(f"SUMMARY<<ENVSEP\n{summary}\nENVSEP\n")
    f.write(f"DESCRIPTION<<ENVSEP\n{description}\nENVSEP\n")
    f.write(f"COMMENTS<<ENVSEP\n{comments}\nENVSEP\n")

print(f"Summary     : {len(summary)} chars")
print(f"Description : {len(description)} chars")
print(f"Comments    : {len(comments)} chars")
PYEOF

          cat jira_fields.env >> "$GITHUB_ENV"        

    
      # ---------------------------
      # Prompt builder (moved to script)
      # ---------------------------
      - name: Write prompt
        run: |
          set -euo pipefail
          python3 write_prompt.py \
            "${{ inputs.jira_id }}" \
            "${{ inputs.domain }}"

      # ---------------------------
      # Safety check
      # ---------------------------
      - name: Pre-flight size check
        run: |
          set -euo pipefail
          BYTES=$(wc -c < prompt.txt)

          echo "Prompt file: ${BYTES} bytes"

          if [ "$BYTES" -gt 100000 ]; then
            echo "::error::Prompt exceeds safe limit"
            exit 1
          fi

      # ---------------------------
      # Claude call
      # ---------------------------
      - name: Generate feature via Claude API
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail
          MODEL="${{ inputs.llm_model }}"

          jq -n \
            --arg model "$MODEL" \
            --rawfile prompt prompt.txt \
            '{
              model: $model,
              max_tokens: 4096,
              temperature: 0,
              system: "You are a senior QA automation engineer. Output raw Gherkin only.",
              messages: [{ role: "user", content: $prompt }]
            }' > request.json

          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            HTTP_RESPONSE=$(mktemp)
            HTTP_CODE=$(curl -s -o "$HTTP_RESPONSE" -w "%{http_code}" \
              https://api.anthropic.com/v1/messages \
              -H "Authorization: Bearer $CLAUDE_CODE_OAUTH_TOKEN" \
              -H "anthropic-version: 2023-06-01" \
              -H "anthropic-beta: oauth-2025-04-20" \
              -H "Content-Type: application/json" \
              --data @request.json)

            if [ "$HTTP_CODE" -eq 200 ]; then
              break
            fi

            echo "HTTP $HTTP_CODE — response:"
            cat "$HTTP_RESPONSE"

            if [ "$attempt" -lt 3 ]; then
              echo "Waiting 60s before retry..."
              sleep 60
            else
              echo "::error::Claude API failed after 3 attempts"
              exit 1
            fi
          done

          FEATURE=$(jq -r '.content[] | select(.type=="text") | .text' "$HTTP_RESPONSE")
          FEATURE=$(echo "$FEATURE" | sed 's/```//g')

          if ! echo "$FEATURE" | grep -q "^Feature:"; then
            echo "::error::Invalid output"
            exit 1
          fi

          echo "$FEATURE" > generated.feature
          echo "Feature file generated successfully"

      # ---------------------------
      # Save file
      # ---------------------------
      - name: Save feature file
        run: |
          set -euo pipefail

          FILE="${{ inputs.jira_id }}.feature"
          TARGET="$FEATURE_DIR/${{ inputs.domain }}"

          mkdir -p "$TARGET"
          cp generated.feature "$TARGET/$FILE"

          echo "FILE=${{ inputs.domain }}/$FILE" >> "$GITHUB_ENV"

      # ---------------------------
      # Validate
      # ---------------------------
      - name: Validate Output
        run: |
          set -euo pipefail

          SCENARIO_COUNT=$(grep -cE 'Scenario:' generated.feature || true)
          TODO_COUNT=$(grep -c '@todo' generated.feature || true)

          if [ "$SCENARIO_COUNT" -ne "$TODO_COUNT" ]; then
            echo "::error::Mismatch @todo vs scenarios"
            exit 1
          fi

      # ---------------------------
      # Commit
      # ---------------------------
      - name: Commit & push
        run: |
          set -euo pipefail

          git add "$FEATURE_DIR/${{ env.FILE }}"
          git commit -m "feat(${{ inputs.jira_id }}): generate feature file" || true
          git push origin "${{ env.BRANCH }}" --force

      # ---------------------------
      # PR creation
      # ---------------------------
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail

          PR=$(gh pr list --head "${{ env.BRANCH }}" --json number --jq '.[0].number')

          if [ -n "$PR" ]; then
            echo "PR already exists: $PR"
            exit 0
          fi

          cat > pr_body.txt <<EOF
          Auto-generated BDD feature file.

          Jira: ${{ inputs.jira_id }}
          Domain: ${{ inputs.domain }}
          Model: ${{ inputs.llm_model }}
          EOF

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): ${{ env.SUMMARY }}" \
            --body-file pr_body.txt
