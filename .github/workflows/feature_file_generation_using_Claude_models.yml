name: JIRA - Feature File (GHERKIN) Generator Using CLAUDE

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., QA-1321)"
        required: true
        type: string

      domain:
        description: "Target domain/sub-folder"
        required: true
        type: choice
        default: "life"
        options: [life, studio, hcp]

      llm_model:
        description: "Select Claude Model"
        required: true
        type: choice
        default: "claude-haiku-4-5"
        options:
          - claude-haiku-4-5
          - claude-sonnet-4-6
          - claude-opus-4-8
          - claude-opus-4-7
          - claude-opus-4-6

permissions:
  contents: write
  pull-requests: write

env:
  FEATURE_DIR: src/test/resources/features

jobs:
  generate-feature:
    runs-on: ubuntu-latest

    steps:

      # ---------------------------
      # Checkout
      # ---------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      # ---------------------------
      # Dependencies
      # ---------------------------
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      # ---------------------------
      # Build context
      # ---------------------------
      - name: Build AI repository context
        run: |
          set -euo pipefail
          mkdir -p "$FEATURE_DIR"

          python3 - << 'PY'
          import os, glob, re
          from collections import defaultdict

          feature_dir = os.environ.get("FEATURE_DIR", "src/test/resources/features")

          steps_by_domain = defaultdict(set)
          scenarios = []

          for file_path in glob.glob(f"{feature_dir}/**/*.feature", recursive=True):
              domain = os.path.basename(os.path.dirname(file_path))
              if domain in ["features", ""]:
                  domain = "general"

              with open(file_path, "r", encoding="utf-8") as f:
                  content = f.read()

              for m in re.finditer(r'^\s*(Scenario|Scenario Outline):\s*(.+)', content, re.MULTILINE):
                  scenarios.append(f"[{domain}] {m.group(0).strip()}")

              for line in content.split("\n"):
                  line = line.strip()
                  if re.match(r'^(Given|When|Then|And|But)\s+', line):
                      steps_by_domain[domain].add(line)

          with open("step_dictionary.txt", "w", encoding="utf-8") as f:
              for d, steps in sorted(steps_by_domain.items()):
                  f.write(f"\n--- Domain: {d} ---\n")
                  f.write("\n".join(sorted(steps)) + "\n")

          with open("scenario_dictionary.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(scenarios))

          print("Domains:", sorted(steps_by_domain.keys()))
          print("Total steps:", sum(len(v) for v in steps_by_domain.values()))
          print("Total scenarios:", len(scenarios))
          PY

          echo "Step dictionary  : $(wc -l < step_dictionary.txt) lines"
          echo "Scenario dict    : $(wc -l < scenario_dictionary.txt) lines"

      # ---------------------------
      # Create branch
      # ---------------------------
      - name: Create branch
        run: |
          set -euo pipefail

          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin main
          git checkout -b "$BRANCH" origin/main || git checkout "$BRANCH"

          echo "BRANCH=$BRANCH" >> "$GITHUB_ENV"

      # ---------------------------
      # Fetch Jira
      # ---------------------------
      - name: Fetch Jira details
        run: |
          set -euo pipefail

          RESPONSE=$(curl -s --fail \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          echo "$RESPONSE" > jira_response.json

          echo "=== Description field type ==="
          jq -r '.fields.description | type' jira_response.json

      # ---------------------------
      # Parse Jira fields
      # ---------------------------
      - name: Parse Jira fields
        run: |
          set -euo pipefail
          python3 parse_jira_fields.py
          cat jira_fields.env >> "$GITHUB_ENV"
          echo "=== Description file size ==="
          wc -c jira_description.txt

      # ---------------------------
      # Prompt builder
      # ---------------------------
      - name: Write prompt
        run: |
          set -euo pipefail

          MODEL="${{ inputs.llm_model }}"

          # Warn early if Haiku is selected for a large/multi-component ticket.
          # Haiku has weaker multi-component reasoning — it reliably misses the
          # second component on complex tickets even with sufficient token budget.
          # The write_prompt.py injects a component checklist to compensate,
          # but Sonnet or Opus is strongly preferred for tickets > 3,000 bytes.
          if [[ "$MODEL" == *"haiku"* ]]; then
            DESC_SIZE=$(wc -c < jira_description.txt 2>/dev/null || echo 0)
            echo "Description size : ${DESC_SIZE} bytes"
            if [ "$DESC_SIZE" -gt 3000 ]; then
              echo "::warning::Large ticket (${DESC_SIZE} bytes) with Haiku model selected."
              echo "::warning::Haiku may miss requirements on tickets with multiple components."
              echo "::warning::Re-run with claude-sonnet-4-6 if any components are missing from output."
            fi
          fi

          python3 write_prompt.py \
            "${{ inputs.jira_id }}" \
            "${{ inputs.domain }}"
        env:
          LLM_MODEL: ${{ inputs.llm_model }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      # ---------------------------
      # Pre-flight size check
      # IMPORTANT: limit is based on the selected model's actual context window.
      #   claude-haiku-4-5   → 200k tokens → ~800,000 bytes
      #   claude-sonnet-4-6  → 1M tokens   → ~4,000,000 bytes
      #   claude-opus-4-6/7/8 → 1M tokens  → ~4,000,000 bytes
      # The old hardcoded 100,000 byte limit was cutting off large tickets
      # BEFORE they reached Claude, causing incomplete generation (e.g. entire
      # Geographic Performance component missing from output).
      # ---------------------------
      - name: Pre-flight size check
        run: |
          set -euo pipefail

          MODEL="${{ inputs.llm_model }}"
          BYTES=$(wc -c < prompt.txt)
          echo "Prompt size : ${BYTES} bytes"
          echo "Model       : ${MODEL}"

          # Set byte limit per model (tokens * 4 bytes/token * 75% safety margin)
          case "$MODEL" in
            *"haiku-4-5"*)
              # 200k tokens * 4 * 0.75 = 600,000 bytes
              LIMIT=600000
              ;;
            *"sonnet-4-6"*|*"opus-4-6"*|*"opus-4-7"*|*"opus-4-8"*)
              # 1M tokens * 4 * 0.75 = 3,000,000 bytes
              LIMIT=3000000
              ;;
            *)
              echo "::warning::Unknown model '$MODEL' — applying conservative 600,000 byte limit"
              LIMIT=600000
              ;;
          esac

          echo "Byte limit  : ${LIMIT} (for ${MODEL})"

          if [ "$BYTES" -gt "$LIMIT" ]; then
            echo "::error::Prompt (${BYTES} bytes) exceeds the context limit for ${MODEL} (${LIMIT} bytes)."
            echo "::error::Switch to claude-sonnet-4-6 or an Opus model, or reduce ticket scope."
            exit 1
          fi

          echo "Pre-flight passed: ${BYTES} / ${LIMIT} bytes used ($(( BYTES * 100 / LIMIT ))%)"

      # ---------------------------
      # Generate feature via Claude API (with retry)
      # ---------------------------
      - name: Generate feature via Claude API
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail

          MODEL="${{ inputs.llm_model }}"

          # Model-aware max_tokens based on official Anthropic output limits (June 2026):
          #   claude-haiku-4-5   → 64,000 output tokens
          #   claude-sonnet-4-6  → 64,000 output tokens
          #   claude-opus-4-6    → 128,000 output tokens
          #   claude-opus-4-7    → 128,000 output tokens
          #   claude-opus-4-8    → 128,000 output tokens
          case "$MODEL" in
            *"opus-4-6"*|*"opus-4-7"*|*"opus-4-8"*)
              MAX_TOKENS=128000
              ;;
            *"haiku-4-5"*|*"sonnet-4-6"*)
              MAX_TOKENS=64000
              ;;
            *)
              echo "::warning::Unknown model '$MODEL' — defaulting max_tokens to 64000"
              MAX_TOKENS=64000
              ;;
          esac

          echo "Model      : $MODEL"
          echo "Max tokens : $MAX_TOKENS"

          # Build request JSON — omit temperature for Opus 4.7+
          if [[ "$MODEL" == *"opus-4-7"* || "$MODEL" == *"opus-4-8"* ]]; then
            echo "Extended model detected — omitting temperature"
            jq -n \
              --arg model  "$MODEL" \
              --argjson max "$MAX_TOKENS" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                max_tokens: $max,
                system: "You are a senior QA automation engineer. Output raw Gherkin only.",
                messages: [{ role: "user", content: $prompt }]
              }' > request.json
          else
            jq -n \
              --arg model  "$MODEL" \
              --argjson max "$MAX_TOKENS" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                max_tokens: $max,
                temperature: 0,
                system: "You are a senior QA automation engineer. Output raw Gherkin only.",
                messages: [{ role: "user", content: $prompt }]
              }' > request.json
          fi

          # Call Claude API with up to 3 retries
          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            HTTP_RESPONSE=$(mktemp)
            HTTP_CODE=$(curl -s -o "$HTTP_RESPONSE" -w "%{http_code}" \
              https://api.anthropic.com/v1/messages \
              -H "Authorization: Bearer $CLAUDE_CODE_OAUTH_TOKEN" \
              -H "anthropic-version: 2023-06-01" \
              -H "anthropic-beta: oauth-2025-04-20" \
              -H "Content-Type: application/json" \
              --data @request.json)

            if [ "$HTTP_CODE" -eq 200 ]; then
              break
            fi

            echo "HTTP $HTTP_CODE — response body:"
            cat "$HTTP_RESPONSE"

            if [ "$attempt" -lt 3 ]; then
              echo "Retrying in 60s..."
              sleep 60
            else
              echo "::error::Claude API failed after 3 attempts (last HTTP code: $HTTP_CODE)"
              exit 1
            fi
          done

          # Guard: stop_reason must be "end_turn" — not "max_tokens"
          STOP_REASON=$(jq -r '.stop_reason' "$HTTP_RESPONSE")
          echo "Stop reason : $STOP_REASON"
          if [ "$STOP_REASON" = "max_tokens" ]; then
            echo "::error::Output truncated at max_tokens ($MAX_TOKENS) — feature file is incomplete."
            echo "::error::Switch to an Opus model (128k output) or split the Jira ticket."
            exit 1
          fi

          # Extract and clean Gherkin
          RAW=$(jq -r '.content[] | select(.type=="text") | .text' "$HTTP_RESPONSE")
          CLEANED=$(echo "$RAW" | sed 's/```gherkin//g; s/```//g')

          # Validate Feature block count
          FEATURE_COUNT=$(echo "$CLEANED" | grep -c "^Feature:" || true)
          if [ "$FEATURE_COUNT" -eq 0 ]; then
            echo "::error::Invalid Gherkin output — no Feature: line found"
            exit 1
          fi
          if [ "$FEATURE_COUNT" -gt 2 ]; then
            echo "::error::Model produced $FEATURE_COUNT Feature blocks — maximum allowed is 2."
            echo "::error::Re-run the workflow; if this persists the ticket may need to be split in Jira."
            exit 1
          fi

          echo "$CLEANED" > raw_output.gherkin
          echo "Feature blocks     : $FEATURE_COUNT"
          echo "Scenarios generated: $(echo "$CLEANED" | grep -cE '^\s*Scenario:|^\s*Scenario Outline:' || true)"

      # ---------------------------
      # Split into feature files (1 file per Feature block)
      # ---------------------------
      - name: Split feature files
        run: |
          set -euo pipefail

          python3 - << 'PY'
          import re, os, sys, shutil

          jira_id = os.environ["JIRA_ID"]

          with open("raw_output.gherkin", "r", encoding="utf-8") as f:
              content = f.read().strip()

          raw_blocks = re.split(r'(?=^Feature:)', content, flags=re.MULTILINE)
          blocks = [b.strip() for b in raw_blocks if b.strip().startswith("Feature:")]

          if not blocks:
              print("::error::No Feature: blocks found in output")
              sys.exit(1)

          print(f"Feature blocks found: {len(blocks)}")

          file_list = []
          if len(blocks) == 1:
              fname = f"{jira_id}.feature"
              with open(fname, "w", encoding="utf-8") as f:
                  f.write(blocks[0])
              file_list.append(fname)
              print(f"Single feature file: {fname}")
          else:
              for i, block in enumerate(blocks, start=1):
                  fname = f"{jira_id}_{i}.feature"
                  with open(fname, "w", encoding="utf-8") as f:
                      f.write(block)
                  count = len(re.findall(r'^\s*(Scenario:|Scenario Outline:)', block, re.MULTILINE))
                  print(f"  File {i}: {fname} ({count} scenarios)")
                  file_list.append(fname)

          with open("feature_files.txt", "w") as f:
              f.write("\n".join(file_list))

          shutil.copy(file_list[0], "generated.feature")
          PY

          echo "Feature files manifest:"
          cat feature_files.txt
        env:
          JIRA_ID: ${{ inputs.jira_id }}

      # ---------------------------
      # Save feature files
      # ---------------------------
      - name: Save feature files
        run: |
          set -euo pipefail

          TARGET="$FEATURE_DIR/${{ inputs.domain }}"
          mkdir -p "$TARGET"

          echo "=== feature_files.txt contents ==="
          cat feature_files.txt
          echo "=== Total files to stage: $(wc -l < feature_files.txt) ==="

          while IFS= read -r fname; do
            if [ -z "$fname" ]; then continue; fi
            echo "Copying $fname → $TARGET/$fname"
            cp "$fname" "$TARGET/$fname"
            git add "$TARGET/$fname"
            git status --short "$TARGET/$fname"
            echo "Staged: $TARGET/$fname"
          done < feature_files.txt

          echo "=== Git status after staging ==="
          git status --short

          FIRST=$(head -1 feature_files.txt)
          echo "FILE=${{ inputs.domain }}/$FIRST" >> "$GITHUB_ENV"

      # ---------------------------
      # Validate all feature files
      # ---------------------------
      - name: Validate feature files
        run: |
          set -euo pipefail

          ALL_PASS=true

          while IFS= read -r fname; do
            FILE_PATH="$FEATURE_DIR/${{ inputs.domain }}/$fname"
            echo "=== Validating $FILE_PATH ==="

            SCENARIO_COUNT=$(grep -cE '^\s*(Scenario:|Scenario Outline:)' "$FILE_PATH" || true)
            TODO_COUNT=$(grep -c '@todo' "$FILE_PATH" || true)

            echo "  Scenarios : $SCENARIO_COUNT"
            echo "  @todo tags: $TODO_COUNT"

            if [ "$SCENARIO_COUNT" -ne "$TODO_COUNT" ]; then
              echo "::error::$fname — @todo mismatch: $TODO_COUNT @todo tags for $SCENARIO_COUNT Scenarios"
              ALL_PASS=false
            else
              echo "  ✓ Validation passed"
            fi
          done < feature_files.txt

          if [ "$ALL_PASS" = "false" ]; then
            exit 1
          fi

      # ---------------------------
      # Commit & push
      # ---------------------------
      - name: Commit & push
        run: |
          set -euo pipefail

          FILE_COUNT=$(wc -l < feature_files.txt | tr -d ' ')

          # Re-add ALL staged feature files explicitly as a safety net.
          # The Save step stages files, but git may drop them between steps
          # in some runner environments. Belt-and-suspenders approach.
          TARGET="$FEATURE_DIR/${{ inputs.domain }}"
          while IFS= read -r fname; do
            if [ -z "$fname" ]; then continue; fi
            git add "$TARGET/$fname"
            echo "Re-staged for commit: $TARGET/$fname"
          done < feature_files.txt

          echo "=== Files in commit ==="
          git diff --cached --name-only

          if [ "$FILE_COUNT" -eq 1 ]; then
            COMMIT_MSG="feat(${{ inputs.jira_id }}): generate feature file"
          else
            COMMIT_MSG="feat(${{ inputs.jira_id }}): generate $FILE_COUNT feature files"
          fi

          git commit -m "$COMMIT_MSG" || echo "Nothing new to commit"
          git push origin "${{ env.BRANCH }}" --force

      # ---------------------------
      # Create Pull Request
      # ---------------------------
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail

          PR=$(gh pr list --head "${{ env.BRANCH }}" --json number --jq '.[0].number')

          if [ -n "$PR" ]; then
            echo "PR already exists: $PR"
            exit 0
          fi

          FILE_COUNT=$(wc -l < feature_files.txt | tr -d ' ')
          FILE_LIST=$(cat feature_files.txt | sed 's/^/- /')

          cat > pr_body.txt << EOF
          Auto-generated BDD feature file(s).

          Jira   : ${{ inputs.jira_id }}
          Domain : ${{ inputs.domain }}
          Model  : ${{ inputs.llm_model }}
          Files  : $FILE_COUNT feature file(s)

          $FILE_LIST
          EOF

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): ${{ env.SUMMARY }}" \
            --body-file pr_body.txt
