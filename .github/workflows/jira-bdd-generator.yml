name: JIRA BDD Feature Generator

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: 'Enter the JIRA Ticket ID (e.g., QA-1321)'
        required: true
        type: string

  pull_request:
    types: [closed]
    branches:
      - QA-1321


jobs:

  # ======================================
  # JOB 1: Generate Feature File from Jira
  # ======================================
  generate-feature-file:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout QA-1321 Branch
        uses: actions/checkout@v4
        with:
          ref: QA-1321

      - name: Fetch Jira Issue
        id: fetch_jira
        run: |
          echo "Fetching Jira issue: ${{ inputs.jira_id }}"

          # Fetch response and track HTTP status safely
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)
          echo "HTTP STATUS: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Jira API failed or invalid ticket"
            exit 1
          fi

          # Strip out the HTTP_STATUS suffix line to leave clean JSON
          JSON=$(echo "$RESPONSE" | sed '$d')

          # Extract summary and handle fallback safely
          SUMMARY=$(echo "$JSON" | jq -r '.fields.summary // "NO_SUMMARY"')

          # Robust extraction of text from Jira's ADF structure
          DESCRIPTION=$(echo "$JSON" | jq -r '[.. | .text? // empty] | join(" ")' | tr -d '"')

          # Use GitHub Actions Multiline String Syntax to prevent Exit 43 / Syntax crashes
          echo "SUMMARY=$SUMMARY" >> $GITHUB_ENV
          
          echo "DESCRIPTION<<EOF" >> $GITHUB_ENV
          echo "$DESCRIPTION" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Generate Feature File
        run: |
          echo "Generating feature file..."

          CLEAN_SUMMARY=$(echo "${{ env.SUMMARY }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/_/g')

          FILE_NAME="${{ inputs.jira_id }}_${CLEAN_SUMMARY}.feature"

          TARGET_DIR="src/test/resources/features"
          mkdir -p "$TARGET_DIR"

          {
            echo "@${{ inputs.jira_id }}"
            echo "Feature: ${{ env.SUMMARY }}"
            echo ""
            echo "  Background:"
            echo "    # Jira Description:"
            echo "    ${{ env.DESCRIPTION }}"
            echo ""
            echo "  Scenario: Verify requirements for ${{ inputs.jira_id }}"
            echo "    Given the user is logged into the application"
            echo "    When the user processes requirements from Jira"
            echo "    Then the system behaves as expected"
          } > "$TARGET_DIR/$FILE_NAME"

      - name: Commit Changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .

          git commit -m "feat: generated feature file for ${{ inputs.jira_id }}" || echo "No changes"

          git push origin QA-1321


  # ======================================
  # JOB 2: Close Jira After PR Merge
  # ======================================
  close-jira-ticket:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'QA-1321'
    runs-on: ubuntu-latest

    steps:
      - name: Extract Jira ID
        id: extract_id
        run: |
          JIRA_ID=$(echo "${{ github.event.pull_request.head.ref }}" \
            | grep -oE '[A-Z]+-[0-9]+' \
            | head -n 1)

          echo "jira_id=$JIRA_ID" >> $GITHUB_OUTPUT

      - name: Transition Jira to Done
        run: |
          AUTH="${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}"

          TRANSITIONS_URL="${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ steps.extract_id.outputs.jira_id }}/transitions"

          RESPONSE=$(curl -s -u "$AUTH" \
            -H "Accept: application/json" \
            "$TRANSITIONS_URL")

          TRANSITION_ID=$(echo "$RESPONSE" | jq -r '.transitions[] | select(.name=="Done") | .id')

          if [ -z "$TRANSITION_ID" ] || [ "$TRANSITION_ID" = "null" ]; then
            TRANSITION_ID=$(echo "$RESPONSE" | jq -r '.transitions[] | select(.name=="Closed") | .id')
          fi

          if [ ! -z "$TRANSITION_ID" ] && [ "$TRANSITION_ID" != "null" ]; then
            curl -s -X POST \
              -u "$AUTH" \
              -H "Content-Type: application/json" \
              --data "{\"transition\":{\"id\":\"$TRANSITION_ID\"}}" \
              "$TRANSITIONS_URL"

            echo "✅ Jira ticket moved to Done"
          else
            echo "⚠️ No valid transition found"
          fi
