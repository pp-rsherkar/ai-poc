name: JIRA BDD Feature Generator

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: 'Enter the JIRA Ticket ID (e.g., QA-1321)'
        required: true
        type: string

  pull_request:
    types: [closed]
    branches:
      - main


jobs:

  generate-feature-file:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout base branch (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ======================================
      # STEP 1: BUILD STEP LIBRARY FROM MAIN
      # ======================================
      - name: Build reusable step library from main branch
        run: |
          echo "Building reusable step library..."

          mkdir -p tmp_steps
          STEP_DB="tmp_steps/step_library.txt"
          rm -f "$STEP_DB"
          touch "$STEP_DB"

          find src/test/resources/features -name "*.feature" | while read file; do
            grep -E "Given |When |Then " "$file" >> "$STEP_DB" || true
          done

          # normalize
          sed -i 's/[0-9]/#/g' "$STEP_DB"
          sed -i 's/  */ /g' "$STEP_DB"

          sort "$STEP_DB" | uniq > tmp_steps/step_library_clean.txt

          echo "STEP_LIBRARY=tmp_steps/step_library_clean.txt" >> $GITHUB_ENV

      # ======================================
      # STEP 2: CREATE / REUSE BRANCH
      # ======================================
      - name: Create or reuse Jira branch
        run: |
          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null; then
            echo "Reusing existing branch: $BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git pull --rebase origin "$BRANCH"
          else
            echo "Creating new branch: $BRANCH"
            git checkout -b "$BRANCH" origin/main
          fi

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # ======================================
      # STEP 3: FETCH JIRA
      # ======================================
      - name: Fetch Jira Issue
        id: fetch_jira
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Jira API failed"
            exit 1
          fi

          JSON=$(echo "$RESPONSE" | sed '$d')

          SUMMARY=$(echo "$JSON" | jq -r '.fields.summary // "NO_SUMMARY"')
          DESCRIPTION=$(echo "$JSON" | jq -r '[.. | .text? // empty] | join(" ")')

          echo "SUMMARY=$SUMMARY" >> $GITHUB_ENV

          echo "DESCRIPTION<<EOF" >> $GITHUB_ENV
          echo "$DESCRIPTION" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # ======================================
      # STEP 4: GENERATE FEATURE FILE
      # ======================================
      - name: Generate Feature File
        run: |
          echo "Generating feature file..."

          CLEAN_SUMMARY=$(echo "${{ env.SUMMARY }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/_/g' \
            | sed 's/__*/_/g' \
            | sed 's/^_//;s/_$//')

          FILE_NAME="${{ inputs.jira_id }}_${CLEAN_SUMMARY}.feature"
          TARGET_DIR="src/test/resources/features"
          mkdir -p "$TARGET_DIR"

          DESCRIPTION="${{ env.DESCRIPTION }}"

          SENTENCES=$(echo "$DESCRIPTION" | grep -oP '[A-Z][^.!?]{10,}[.!?]' | sed 's/[.!?]$//')

          RAW_STEP1=$(echo "$SENTENCES" | sed -n '1p')
          RAW_STEP2=$(echo "$SENTENCES" | sed -n '2p')
          RAW_STEP3=$(echo "$SENTENCES" | sed -n '3p')

          STEP_LIBRARY="${STEP_LIBRARY:-tmp_steps/step_library_clean.txt}"

          match_step() {
            local input="$1"
            local file="$STEP_LIBRARY"

            MATCH=$(grep -i "$input" "$file" | head -n 1)

            if [ -n "$MATCH" ]; then
              echo "$MATCH"
            else
              echo "$input"
            fi
          }

          STEP1=$(match_step "$RAW_STEP1")
          STEP2=$(match_step "$RAW_STEP2")
          STEP3=$(match_step "$RAW_STEP3")

          if [ -z "$STEP1" ]; then
            STEP1=$(match_step "user is authenticated")
            STEP2=$(match_step "user performs action")
            STEP3=$(match_step "system validates behavior")
          fi

          FEATURE_NAME=$(echo "${{ env.SUMMARY }}" \
            | sed 's/\[Automation\]//g' \
            | xargs)

          FEATURE_DESC=$(echo "$DESCRIPTION" \
            | grep -oP '[A-Z][^.!?]{40,}[.!?]' \
            | head -n 1 \
            | sed 's/[.!?]$//')

          if [ -z "$FEATURE_DESC" ]; then
            FEATURE_DESC="Validate system behavior for $FEATURE_NAME"
          fi

          {
            echo "Feature: $FEATURE_NAME"
            echo "  $FEATURE_DESC"
            echo ""
            echo "  Background:"
            echo "    Given the user is managing tactic creatives"
            echo ""
            echo "  @todo"
            echo "  Scenario: Validate $FEATURE_NAME behavior"
            echo "    Given $STEP1"
            echo "    When $STEP2"
            echo "    Then $STEP3"
          } > "$TARGET_DIR/$FILE_NAME"

          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

          cat "$TARGET_DIR/$FILE_NAME"

      # ======================================
      # STEP 5: COMMIT + PUSH
      # ======================================
      - name: Commit and push feature branch
        run: |
          git add .

          if git diff --cached --quiet; then
            echo "No changes"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git commit -m "feat(${{ inputs.jira_id }}): generate BDD feature file"

            git push --force-with-lease origin "${{ env.BRANCH }}"

            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      # ======================================
      # STEP 6: CREATE PR
      # ======================================
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list --head "${{ env.BRANCH }}" --base main --state open --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "${{ env.BRANCH }}" \
            --title "feat(${{ inputs.jira_id }}): ${{ env.SUMMARY }}" \
            --body "Auto-generated BDD feature file from Jira."
