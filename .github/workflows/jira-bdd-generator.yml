name: JIRA BDD Feature Generator

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: 'Enter the JIRA Ticket ID (e.g., QA-1321)'
        required: true
        type: string

  pull_request:
    types: [closed]
    branches:
      - main


jobs:
  generate-feature-file:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      # =========================
      # CLEAN CHECKOUT
      # =========================
      - name: Checkout main (clean)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          clean: true

      # =========================
      # CLEAN WORKSPACE SAFETY
      # =========================
      - name: Ensure clean workspace
        run: |
          git clean -fd

      # =========================
      # STEP INDEX (optional reuse)
      # =========================
      - name: Build step index from main
        run: |
          echo "Building step index..."

          STEP_INDEX=$(find src/test/resources/features -name "*.feature" \
            -exec grep -E "^\s*(Given|When|Then) " {} \; \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z ]/ /g' \
            | sed 's/  */ /g' \
            | sort | uniq)

          echo "STEP_INDEX<<EOF" >> $GITHUB_ENV
          echo "$STEP_INDEX" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # =========================
      # BRANCH HANDLING (CLEAN)
      # =========================
      - name: Create or reuse Jira branch
        run: |
          BRANCH="${{ inputs.jira_id }}"

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git fetch origin main

          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null; then
            echo "Reusing branch: $BRANCH"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git pull --rebase origin "$BRANCH"
          else
            echo "Creating clean branch: $BRANCH"
            git checkout -b "$BRANCH" origin/main
          fi

          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      # =========================
      # JIRA FETCH
      # =========================
      - name: Fetch Jira Issue
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          HTTP_STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d':' -f2)

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Jira API failed"
            exit 1
          fi

          JSON=$(echo "$RESPONSE" | sed '$d')

          SUMMARY=$(echo "$JSON" | jq -r '.fields.summary // "NO_SUMMARY"')
          DESCRIPTION=$(echo "$JSON" | jq -r '[.. | .text? // empty] | join(" ")')

          echo "SUMMARY=$SUMMARY" >> $GITHUB_ENV

          echo "DESCRIPTION<<EOF" >> $GITHUB_ENV
          echo "$DESCRIPTION" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # =========================
      # FEATURE FILE GENERATION
      # =========================
      - name: Generate Feature File
        run: |
          echo "Generating feature file..."

          CLEAN_SUMMARY=$(echo "${{ env.SUMMARY }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9]/_/g' \
            | sed 's/__*/_/g' \
            | sed 's/^_//;s/_$//')

          FILE_NAME="${{ inputs.jira_id }}_${CLEAN_SUMMARY}.feature"
          TARGET_DIR="src/test/resources/features"

          mkdir -p "$TARGET_DIR"

          DESCRIPTION="${{ env.DESCRIPTION }}"

          STEP1="the user is authenticated"
          STEP2="the user performs the action"
          STEP3="the system validates the result"

          FEATURE_DESC=$(echo "$DESCRIPTION" | head -c 120)

          {
            echo "Feature: ${{ env.SUMMARY }}"
            echo "  $FEATURE_DESC"
            echo ""
            echo "  Scenario: Validate ${{ inputs.jira_id }}"
            echo "    Given $STEP1"
            echo "    When $STEP2"
            echo "    Then $STEP3"
          } > "$TARGET_DIR/$FILE_NAME"

          echo "FILE_NAME=$FILE_NAME" >> $GITHUB_ENV
          echo "TARGET_DIR=$TARGET_DIR" >> $GITHUB_ENV

          cat "$TARGET_DIR/$FILE_NAME"

      # =========================
      # SAFE COMMIT (ONLY FEATURE FILE)
      # =========================
      - name: Commit and push (safe)
        run: |
          git add "${{ env.TARGET_DIR }}/${{ env.FILE_NAME }}"

          if git diff --cached --quiet; then
            echo "No changes"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            git commit -m "feat(${{ inputs.jira_id }}): generate BDD feature file"
            git push --force-with-lease origin "${{ env.BRANCH }}"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
          fi

      # =========================
      # SAFE PR CREATION
      # =========================
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING_PR=$(gh pr list \
            --head "${{ env.BRANCH }}" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR already exists"
            exit 0
          fi

          PR_BODY=$(cat <<EOF
          Auto-generated BDD feature file from Jira ticket.
          
          Jira ID: ${{ inputs.jira_id }}
          Summary: ${{ env.SUMMARY }}
          
          Only the feature file is included in this PR.
          EOF
          )
          
                    gh pr create \
                      --base main \
                      --head "${{ env.BRANCH }}" \
                      --title "feat(${{ inputs.jira_id }}): ${{ env.SUMMARY }}" \
                      --body "$PR_BODY"
