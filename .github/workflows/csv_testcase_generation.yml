name: JIRA Testcase CSV Generator

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., PROD-14604)"
        required: true
        type: string

permissions:
  contents: read
  models: read

jobs:
  generate-and-attach:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # Fetch Jira Details
      # =========================
      - name: Fetch Jira details
        run: |
          set -euo pipefail
          echo "Fetching Jira issue: ${{ inputs.jira_id }}"
          
          RESPONSE=$(curl -s --fail \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")
            
          echo "$RESPONSE" > jira_response.json
          
          SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary // "No Summary"')
          DESCRIPTION=$(echo "$RESPONSE" | jq -r '.fields.description | .. | .text? // empty' | tr "\n" " " | sed 's/[[:space:]]\+/ /g')
          COMMENTS=$(echo "$RESPONSE" | jq -r '.fields.comment.comments | sort_by(.created) | .[] | (.author.displayName // "Unknown") + ": " + (.body | .. | .text? // empty)' | tr "\n" " " | sed 's/[[:space:]]\+/ /g')
          
          [ -z "$DESCRIPTION" ] && DESCRIPTION="No Description"
          [ -z "$COMMENTS" ] && COMMENTS="No Comments"
          
          DESCRIPTION=$(echo "$DESCRIPTION" | cut -c1-12000)
          COMMENTS=$(echo "$COMMENTS" | cut -c1-8000)
          
          {
            echo "SUMMARY<<EOF"
            echo "$SUMMARY"
            echo "EOF"
            echo "DESCRIPTION<<EOF"
            echo "$DESCRIPTION"
            echo "EOF"
            echo "COMMENTS<<EOF"
            echo "$COMMENTS"
            echo "EOF"
          } >> "$GITHUB_ENV"

      # =========================
      # Generate Testcases via LLM (JSON Format)
      # =========================
      - name: Generate structured test cases
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          SUMMARY: ${{ env.SUMMARY }}
          DESCRIPTION: ${{ env.DESCRIPTION }}
          COMMENTS: ${{ env.COMMENTS }}
        run: |
          set -euo pipefail
          
          cat <<EOF > prompt.txt
          Analyze the following Jira ticket details and generate a thorough, professional suite of test cases. 
          You must generate:
          - Positive test scenarios (Happy Path workflow)
          - Negative test scenarios (Validation errors, edge conditions, bad inputs)
          - UI/Layout/Toggle states if mentioned in requirements
          
          You must output a single, raw, valid JSON object containing an array called "test_cases".
          No markdown backticks, no wrapping text blocks.
          
          Generate sequential numbers for the 'index' property starting at 1 (e.g., 1, 2, 3...).
          
          Each object in the array must match this schema precisely:
          {
            "index": 1,
            "description": "Verify user can toggle between Tactic and Line Item views",
            "test_data": "Optional specific data parameters needed to execute, leave blank if none",
            "expected_result": "Explicit step outcomes or data update confirmations. If multiple items are listed, use plain string newlines (\n) to separate them."
          }

          JIRA DETAILS:
          ID: ${{ inputs.jira_id }}
          SUMMARY: $SUMMARY
          DESCRIPTION: $DESCRIPTION
          COMMENTS: $COMMENTS
          EOF

          jq -n \
            --rawfile prompt prompt.txt \
            '{
              model: "openai/gpt-4.1",
              temperature: 0,
              response_format: { type: "json_object" },
              messages: [
                {
                  role: "system",
                  content: "You are an expert QA Engineer. Your goal is to dissect requirement descriptions and generate clean, descriptive test validations formatted exactly to the requested structural JSON parameters."
                },
                {
                  role: "user",
                  content: $prompt
                }
              ]
            }' > request.json

          HTTP_RESPONSE=$(mktemp)
          HTTP_CODE=$(curl -s -o "$HTTP_RESPONSE" -w "%{http_code}" \
            https://models.github.ai/inference/chat/completions \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            --data @request.json)

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Model API call dropped with code $HTTP_CODE"
            cat "$HTTP_RESPONSE"
            exit 1
          fi

          cat "$HTTP_RESPONSE" | jq -r '.choices[0].message.content' > raw_output.json

      # =========================
      # Build CSV & Jira Comment Payload
      # =========================
      - name: Process JSON into Excel CSV and Jira Comment
        shell: python
        run: |
          import json
          import csv

          with open('raw_output.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          test_cases = data.get('test_cases', [])
          jira_id = "${{ inputs.jira_id }}"
          
          # 1. Generate the standard CSV matrix matching your Excel template
          csv_file_path = f"Test_Cases_{jira_id}.csv"
          headers = ["Test ID", "Requirement ID", "Test Description", "Test Data", "Expected Result", "Actual Result", "Test Status", "Owner"]
          
          with open(csv_file_path, 'w', newline='', encoding='utf-8') as cf:
              writer = csv.writer(cf)
              writer.writerow(headers)
              
              for tc in test_cases:
                  idx = str(tc.get('index', '1')).zfill(2)
                  test_id = f"TC_{jira_id}_{idx}"
                  
                  writer.writerow([
                      test_id,
                      jira_id,
                      tc.get('description', ''),
                      tc.get('test_data', ''),
                      tc.get('expected_result', ''),
                      "", "", "" 
                  ])

          # 2. Construct Jira v3 Atlassian Document Format (ADF) for a rich UI Table Comment
          # Initialize ADF table structure header rows
          table_rows = [
              {
                  "type": "tableRow",
                  "content": [
                      {"type": "tableHeader", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Test ID", "marks": [{"type": "strong"}]}]}]},
                      {"type": "tableHeader", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Test Description", "marks": [{"type": "strong"}]}]}]},
                      {"type": "tableHeader", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Expected Result", "marks": [{"type": "strong"}]}]}]}
                  ]
              }
          ]

          # Populate data rows dynamically into the ADF body maps
          for tc in test_cases:
              idx = str(tc.get('index', '1')).zfill(2)
              test_id = f"TC_{jira_id}_{idx}"
              
              table_rows.append({
                  "type": "tableRow",
                  "content": [
                      {"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": test_id}]}]},
                      {"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": tc.get('description', 'N/A')}]}]},
                      {"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": tc.get('expected_result', 'N/A')}]}]}
                  ]
              })

          # Combine into the finalized corporate ADF JSON schema
          comment_payload = {
              "body": {
                  "type": "doc",
                  "version": 1,
                  "content": [
                      {
                          "type": "heading",
                          "attrs": {"level": 3},
                          "content": [{"type": "text", "text": "🤖 AI-Generated Test Matrix Summary"}]
                      },
                      {
                          "type": "paragraph",
                          "content": [
                              {"type": "text", "text": "The full detailed test matrix spreadsheet has been compiled and attached natively below. Here is the high-level preview:"}
                          ]
                      },
                      {
                          "type": "table",
                          "content": table_rows
                      }
                  ]
              }
          }

          with open('jira_comment_payload.json', 'w', encoding='utf-8') as jf:
              json.dump(comment_payload, jf, ensure_ascii=False, indent=2)

      # =========================
      # Post Test Case Comment to JIRA
      # =========================
      - name: Post Table Comment to Jira Ticket
        run: |
          set -euo pipefail
          echo "Posting test case review table to Jira Ticket Comment section..."
          
          curl -s --fail \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data @jira_comment_payload.json \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}/comment"

      # =========================
      # Attach CSV File directly back to JIRA
      # =========================
      - name: Attach CSV to Jira Ticket
        run: |
          set -euo pipefail
          CSV_PATH="Test_Cases_${{ inputs.jira_id }}.csv"
          
          echo "Uploading spreadsheet artifact $CSV_PATH directly to Jira Issue..."
          
          curl -s --fail \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -X POST \
            -H "X-Atlassian-Token: no-check" \
            --form "file=@$CSV_PATH" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}/attachments"
          
          echo "Process complete! File has been bound seamlessly."
