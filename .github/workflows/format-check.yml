name: Weekly format check

# Runs every Sunday at 3:00 PM IST and verifies formatting across the repo using Spotless.
# If anything is mis-formatted, it auto-applies the fixes and opens a pull
# request so reviewers can approve the changes.
on:
  schedule:
    # 3:00 PM IST every Sunday (IST is UTC+5:30, so Sunday 09:30 UTC)
    - cron: "30 9 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  format:
    name: Auto-format and open PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          #ref: main
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Spotless apply
        run: mvn -B -ntp spotless:apply

      - name: Verify formatting is now clean
        run: mvn -B -ntp spotless:check

      - name: Create pull request if changes were made
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.QA_AUTOMATION }}
          commit-message: "chore: weekly auto-format"
          title: "chore: weekly auto-format"
          body: |
            Automated formatting fixes produced by the weekly `Weekly format check` workflow.

            This PR was generated by running `mvn spotless:apply` on the default branch.
            Please review the diff and merge if the changes look correct.
          branch: chore/weekly-auto-format
          delete-branch: true
          labels: |
            automated
            formatting
          add-paths: |
            src/
            pom.xml
            .github/
