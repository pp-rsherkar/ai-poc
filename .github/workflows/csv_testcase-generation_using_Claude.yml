name: JIRA - Testcase (CSV) Generator Using CLAUDE

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Enter JIRA Ticket ID (e.g., PROD-14604)"
        required: true
        type: string
      llm_model:
        description: "Select Claude Model"
        required: true
        type: choice
        default: "claude-haiku-4-5"
        options:
          - claude-haiku-4-5
          - claude-sonnet-4-6
          - claude-opus-4-6
          - claude-opus-4-7
          - claude-opus-4-8

permissions:
  contents: read
  models: read

jobs:
  generate-and-attach:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout repository
        uses: actions/checkout@v4

      # =========================
      # Install dependencies
      # =========================
      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y jq

      # =========================
      # Fetch Jira details
      # IMPORTANT: description and comments are written to FILES, not GITHUB_ENV.
      # GITHUB_ENV silently truncates large multiline values — files are the
      # only reliable way to pass 10000+ char content between steps.
      # Only SUMMARY (short, single-line) goes through GITHUB_ENV.
      # =========================
      - name: Fetch Jira details
        run: |
          set -euo pipefail
          echo "Fetching Jira issue: ${{ inputs.jira_id }}"

          RESPONSE=$(curl -s --fail \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -H "Accept: application/json" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}")

          echo "$RESPONSE" > jira_response.json

          if echo "$RESPONSE" | jq -e '.errorMessages' >/dev/null; then
            echo "Jira API returned an error:"
            cat jira_response.json
            exit 1
          fi

          # SUMMARY is a single short line — safe for GITHUB_ENV
          SUMMARY=$(echo "$RESPONSE" | jq -r '.fields.summary // "No Summary"')
          echo "SUMMARY=$SUMMARY" >> "$GITHUB_ENV"

          # DESCRIPTION and COMMENTS are written to files.
          # GITHUB_ENV heredoc-style writes silently truncate values over a few
          # KB when the total env payload is large — never use it for long content.
          python3 - <<'PYFETCH'
          import json, re, sys
          
          with open("jira_response.json", "r", encoding="utf-8") as f:
              data = json.load(f)
          
          def extract_text(node):
              if node is None:
                  return ""
              if isinstance(node, str):
                  return node
              if isinstance(node, list):
                  return " ".join(extract_text(n) for n in node)
              if isinstance(node, dict):
                  t = node.get("type", "")
                  if t == "text":
                      return node.get("text", "")
                  if t in ("hardBreak", "rule"):
                      return " "
                  return " ".join(extract_text(c) for c in node.get("content", []))
              return ""
          
          def collapse(text):
              return re.sub(r"\s+", " ", text).strip()
          
          desc_node = data.get("fields", {}).get("description")
          description = collapse(extract_text(desc_node)) if desc_node else "No Description"
          
          comments_raw = data.get("fields", {}).get("comment", {}).get("comments", [])
          comments_raw = sorted(comments_raw, key=lambda c: c.get("created", ""))
          
          human_comments = []
          for c in comments_raw:
              body_text = collapse(extract_text(c.get("body")))
              if "AI-Generated Test Matrix Summary" in body_text:
                  continue
              author  = c.get("author", {}).get("displayName", "Unknown")
              created = c.get("created", "")[:10]
              human_comments.append(f"COMMENT [{author} | {created}]: {body_text}")
          
          comments = " ".join(human_comments) if human_comments else "No Comments"
          
          if len(description) > 15000:
              print(f"WARNING: Description {len(description)} chars — truncated to 15000.")
          if len(comments) > 10000:
              print(f"WARNING: Comments {len(comments)} chars — truncated to 10000.")
          
          description = description[:15000]
          comments    = comments[:10000]
          
          print(f"Description written: {len(description)} chars")
          print(f"Comments written   : {len(comments)} chars")
          
          with open("jira_description.txt", "w", encoding="utf-8") as f:
              f.write(description)
          with open("jira_comments.txt", "w", encoding="utf-8") as f:
              f.write(comments)
          PYFETCH

      # =========================
      # Write prompt file
      # The prompt is written directly to prompt.txt using Python's write(),
      # which means it is exactly what you see — no string escaping, no
      # concatenation, no heredoc quoting issues. Easy to read and maintain.
      #
      # The prompt instructs the model to:
      #   1. Read the ENTIRE description and ALL comments before generating anything
      #   2. Extract every testable item from every section of the ticket
      #   3. Generate test cases with concrete test data and verifiable expected results
      #   4. Trace each test case back to its source requirement
      # =========================
      - name: Write prompt file
        env:
          SUMMARY: ${{ env.SUMMARY }}
          JIRA_ID: ${{ inputs.jira_id }}
        run: |
          set -euo pipefail
          python3 - <<'PYPROMPT'
          import os
          
          summary     = os.environ.get("SUMMARY", "")[:500]
          jira_id     = os.environ.get("JIRA_ID", "")
          
          with open("jira_description.txt", "r", encoding="utf-8") as f:
              description = f.read()
          with open("jira_comments.txt", "r", encoding="utf-8") as f:
              comments = f.read()
          
          print(f"Description loaded : {len(description)} chars")
          print(f"Comments loaded    : {len(comments)} chars")
          
          prompt = f"""You are a senior QA Engineer. Your job is to read a Jira ticket in full and generate a complete, traceable test suite that covers every testable requirement in it.
          
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          OUTPUT FORMAT — STRICT
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          Output a single raw valid JSON object only.
          No markdown. No code fences. No explanation. No preamble. Start with {{ and end with }}.
          
          Each test case must have exactly these five fields:
            "index"              — sequential integer starting at 1
            "requirement_source" — name of the exact section/item this test covers (e.g. "AC-2: Modification Behavior", "Edge Case: Pagination", "Comment: John Smith 2025-01-10")
            "description"        — starts with "Verify", describes one specific behaviour
            "test_data"          — concrete: field names, values, counts, roles, timestamps — never vague
            "expected_result"    — specific and verifiable: exact text, exact value, exact UI state — never "works correctly"
          
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          HOW TO READ THIS TICKET
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          Before writing a single test case, read the ENTIRE description and ALL comments below.
          Do not start generating until you have finished reading everything.
          
          As you read, mentally build a checklist of every testable item you find. Only then generate test cases — one or more per checklist item.
          
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          WHAT TO COVER — READ EVERY ONE OF THESE
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          
          1. ACCEPTANCE CRITERIA
             Every AC item needs:
             - At least one positive/happy-path test case
             - At least one negative or boundary test case
          
          2. SCOPE & FEATURE ITEMS
             Every bullet, numbered item, named feature, or component in the scope section needs at least one test case.
             Never skip a scope item because it lacks explicit ACs — infer the testable behaviour from its name and context.
          
          3. DISPLAY CONDITIONS & TRIGGERS
             For every "if X then show Y" rule: test both when the condition is met and when it is not.
          
          4. FORMULAS & CALCULATIONS
             For every formula in the ticket, generate test cases for:
             - The happy-path calculation with concrete numbers
             - Division by zero: what does the UI show when the denominator is 0?
             - Zero result: when numerator is 0, does UI show 0, N/A, or hide the field?
             - Boundary values: 0%, 100%, and exactly 1.0 for multipliers or index values
             - Rounding: when the result is non-integer, what precision does the UI display?
          
          5. UI COMPONENTS & ELEMENT-LEVEL SPEC
             For every UI element described (tooltip, progress bar, table, column, tab, badge, colour rule, popup, subtitle), verify:
             - Tooltip: exact text matches the spec verbatim
             - Progress bar: the bar's full-width denominator matches spec, not just the percentage
             - Colour coding: correct colour at exact boundary values (e.g. index = 1.0 exactly)
             - Table columns: all specified columns are present, in the correct order, with no extras
             - Tabs: each tab's display condition and content are verified separately
             - Popup: opening, content, scrollability, sort order, and out-of-scope features absent
          
          6. EDGE CASES & NEGATIVE SCENARIOS
             Every named edge case needs its own test case. Do not collapse multiple into one.
             Also consider:
             - Empty state: what does each component show when it has no data?
             - Zero records / zero patients / zero DMAs
             - Large datasets: do counts and percentages display correctly at scale?
          
          7. OUT-OF-SCOPE ITEMS
             For each item explicitly marked out of scope, verify it is absent or disabled in the UI.
          
          8. COMMENTS (human-authored only)
             Read every comment. Each comment that adds context, a new scenario, a constraint, a bug observation, or a clarification must produce at least one test case.
             Label its requirement_source as: "Comment: [Author] [date]"
          
          9. RELATED TICKETS & RISK SIGNALS (if present)
             Direct Match / Functional Match tickets: at least one regression test case for the flagged area.
             Risk Signal tickets: at least one test case for the identified risk.
          
          10. DISCREPANCIES & AMBIGUITIES (if present, e.g. [DISCREPANCIES-START] sections)
              Each ambiguity describes two possible interpretations. Write one test case per interpretation.
          
          11. REGRESSION / POINTS TO NOTE (if present)
              Every item flagged for regression or listed as a verification point needs at least one test case.
          
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          RULES FOR EVERY TEST CASE
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          
          FIELD: test_data
          Must be concrete — use real values, not descriptions of values.
            REJECT: "some records", "various inputs", "a tactic with HCP2DTC factor"
            ACCEPT: "NPI List with 100 NPIs; 75 with ≥1 exposed patient; 25 with 0 exposed patients"
          
          FIELD: expected_result
          Must be specific and verifiable. State exact values, exact text, exact UI state.
            REJECT: "displays correctly", "works as expected", "tooltip is shown", "data is displayed"
            ACCEPT: "Coverage Rate displays 75% and the progress bar fills to 75% of its total width"
          
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          SPECIFIC RULES FOR COMMON GAPS
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          
          TOOLTIPS — CRITICAL:
          When the ticket defines a tooltip string verbatim, the expected_result MUST quote it exactly
          in single quotes. Never write "tooltip text matches specification."
            REJECT: "Tooltip displays the correct text per the specification"
            ACCEPT: "Tooltip displays: 'Percentage of seed NPIs where at least one patient was reached.'"
          
          FORMULAS — CRITICAL:
          For every formula A/B or A÷B in the ticket, you MUST generate all five of these:
            (a) Happy path — concrete numbers, expected result with correct value
            (b) Denominator = 0 — what does the UI show? State the exact display: N/A, 0, or hidden
            (c) Numerator = 0 — result is zero; verify UI shows 0 or N/A, not blank space
            (d) Boundary values — 0%, 100%, exactly 1.0 for multipliers/indexes
            (e) Rounding — non-integer result; verify the exact decimal precision displayed (e.g. "4.11" not "4.1")
          Never collapse these into one test case.
          
          COLOUR CODING:
          When the spec defines colour logic (e.g. green if > 1, grey if ≤ 1), generate three cases:
            (a) Value clearly above the threshold → correct colour
            (b) Value clearly below the threshold → correct colour
            (c) Value at EXACTLY the threshold (e.g. index = 1.00 exactly) → this boundary is mandatory
          
          PROGRESS BARS:
          When a progress bar is specified, generate two separate test cases:
            (a) Percentage fill is correct (e.g. 30% fills 30% of the bar)
            (b) The full-bar denominator matches the spec definition — not always 100%.
                If spec says "entire bar = total brand drug prescriptions for exposed patients",
                verify this with a test where exposed_total ≠ unexposed_total.
          
          OUT-OF-SCOPE FEATURES:
          For each item explicitly marked out of scope, generate one test case confirming
          the feature is absent or disabled in the UI. Never skip these.
          
          DISPLAY CONDITIONS:
          For every "if X show Y" rule, generate:
            (a) Condition is met → component/section is visible
            (b) Condition is not met → component/section is absent
          
          EDGE CASES:
          Every named edge case gets its own test case. Never merge two edge cases into one.
          
          DISCREPANCIES:
          For each discrepancy or ambiguity, generate one test case per interpretation (A and B).
          
          COMMENTS:
          Every human comment that adds context, a bug, a constraint, or a scenario gets
          at least one test case labelled: "Comment: [Author Name] [YYYY-MM-DD]"
          
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          SELF-AUDIT — REQUIRED BEFORE OUTPUTTING
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          Before writing the final JSON, mentally verify every item below.
          Fix any failure before outputting. Do not output until all pass.
          
          TOOLTIPS
          [ ] Every tooltip string defined in the spec has a test case that quotes the exact text verbatim
          [ ] No expected_result says "tooltip text matches specification" or similar
          
          FORMULAS
          [ ] Every formula has all five cases: happy path, denominator=0, numerator=0, boundary, rounding
          [ ] The denominator=0 expected_result states exactly what the UI shows (not "handled correctly")
          
          COLOUR CODING
          [ ] Every colour rule has: above threshold + below threshold + exactly AT the threshold
          
          PROGRESS BARS
          [ ] Every progress bar has a percentage test AND a denominator/scale test
          
          EXPECTED RESULTS
          [ ] No expected_result contains: "correctly", "as expected", "per specification",
              "matches spec", "is displayed", "works", or "appropriate"
          [ ] Every expected_result states an exact value, exact text, or exact UI state
          
          TEST DATA
          [ ] No test_data contains: "some records", "various", "a record", "a tactic",
              or any other vague placeholder
          [ ] Every test_data has concrete values (numbers, names, timestamps, role names)
          
          COMPLETENESS
          [ ] Every named edge case has its own separate test case
          [ ] Every discrepancy has one test case per interpretation
          [ ] Every out-of-scope item has a test confirming its absence
          [ ] Every AC has at least one positive and one negative/boundary test case
          [ ] No duplicate test cases
          
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          JIRA TICKET
          ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
          ID      : {jira_id}
          SUMMARY : {summary}
          
          --- DESCRIPTION (read completely before generating) ---
          {description}
          
          --- COMMENTS (read completely before generating) ---
          {comments}
          """
          
          with open("prompt.txt", "w", encoding="utf-8") as f:
              f.write(prompt)
          
          size  = len(prompt.encode("utf-8"))
          words = len(prompt.split())
          print(f"Prompt written     : {size} bytes / {words} words (est. {words // 3} tokens)")
          PYPROMPT

      # =========================
      # Pre-flight size check
      # =========================
      - name: Pre-flight size check
        run: |
          set -euo pipefail

          BYTES=$(wc -c < prompt.txt)
          echo "Prompt file: ${BYTES} bytes"

          if [ "$BYTES" -gt 120000 ]; then
            echo "::error::Prompt exceeds safe limit (120000 bytes). Consider splitting the ticket."
            exit 1
          fi

      # =========================
      # Generate Testcases via Claude API (with retry)
      # max_tokens: set to each model's actual ceiling (64k for Haiku/Sonnet, 128k for Opus).
      # Opus 4.7+ omits temperature (unsupported by those models).
      #
      # NOTE: the truncation recovery logic is written to recover.py during
      # this step rather than inlined as a heredoc, because nesting <<'PYEOF'
      # inside the step that is itself launched by <<'PYPROMPT' causes bash to
      # lose track of the outer delimiter and fail with "unexpected end of file".
      # =========================
      - name: Generate structured test cases
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          set -euo pipefail

          # Write the recovery script to a file so it is never inside a heredoc
          cat > recover.py << 'RECOVEREOF'
          import json, sys
          
          with open("raw_output.json", "r", encoding="utf-8") as f:
              raw = f.read().strip()
          
          last_complete = raw.rfind('},')
          if last_complete == -1:
              last_complete = raw.rfind('}')
          
          if last_complete == -1:
              print("Cannot recover: no complete test case objects found")
              sys.exit(1)
          
          recovered = raw[:last_complete + 1] + "\n  ]\n}"
          
          brace_start = recovered.find('{')
          if brace_start > 0:
              recovered = recovered[brace_start:]
          
          try:
              data = json.loads(recovered)
          except json.JSONDecodeError as e:
              print(f"Recovery failed: {e}")
              print(recovered[:500])
              sys.exit(1)
          
          tc = data.get("test_cases", [])
          print(f"Recovery succeeded — salvaged {len(tc)} complete test cases")
          
          with open("raw_output.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          RECOVEREOF

          MODEL="${{ inputs.llm_model }}"

          # Set max_tokens to each model's actual ceiling so large tickets
          # (100+ test cases) are never truncated mid-response.
          # Opus 4.6/4.7/4.8 → 128,000 tokens
          # Sonnet 4.6 / Haiku 4.5 → 64,000 tokens
          # Opus 4.7+ also omits temperature (unsupported by those models).
          if [[ "$MODEL" == *"opus-4-7"* || "$MODEL" == *"opus-4-8"* ]]; then
            echo "Opus 4.7/4.8 detected — omitting temperature, max_tokens 128000"
            jq -n \
              --arg model "$MODEL" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                max_tokens: 128000,
                system: "You are a senior QA Engineer. Output only a raw valid JSON object with a test_cases array. No markdown, no fences, no commentary.",
                messages: [{ role: "user", content: $prompt }]
              }' > request.json
          elif [[ "$MODEL" == *"opus-4-6"* ]]; then
            echo "Opus 4.6 detected — max_tokens 128000"
            jq -n \
              --arg model "$MODEL" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                max_tokens: 128000,
                temperature: 0,
                system: "You are a senior QA Engineer. Output only a raw valid JSON object with a test_cases array. No markdown, no fences, no commentary.",
                messages: [{ role: "user", content: $prompt }]
              }' > request.json
          else
            echo "Sonnet/Haiku detected — max_tokens 64000"
            jq -n \
              --arg model "$MODEL" \
              --rawfile prompt prompt.txt \
              '{
                model: $model,
                max_tokens: 64000,
                temperature: 0,
                system: "You are a senior QA Engineer. Output only a raw valid JSON object with a test_cases array. No markdown, no fences, no commentary.",
                messages: [{ role: "user", content: $prompt }]
              }' > request.json
          fi

          echo "Request size: $(wc -c < request.json) bytes"
          echo "Calling Claude API..."

          for attempt in 1 2 3; do
            echo "Attempt $attempt..."
            HTTP_RESPONSE=$(mktemp)
            HTTP_CODE=$(curl -s -o "$HTTP_RESPONSE" -w "%{http_code}" \
              https://api.anthropic.com/v1/messages \
              -H "Authorization: Bearer $CLAUDE_CODE_OAUTH_TOKEN" \
              -H "anthropic-version: 2023-06-01" \
              -H "anthropic-beta: oauth-2025-04-20" \
              -H "Content-Type: application/json" \
              --data @request.json)

            echo "HTTP Status: $HTTP_CODE"

            if [ "$HTTP_CODE" -eq 200 ]; then
              break
            fi

            cat "$HTTP_RESPONSE"

            if [ "$attempt" -lt 3 ]; then
              echo "Retrying in 60 seconds..."
              sleep 60
            else
              echo "::error::Claude API failed after retries"
              exit 1
            fi
          done

          # Extract content — strip any markdown fences the model may emit
          jq -r '.content[] | select(.type=="text") | .text' "$HTTP_RESPONSE" \
            | sed 's/```json//g' \
            | sed 's/```//g' \
            | sed '/^[[:space:]]*$/d' \
            > raw_output.json

          # Recovery: if response was cut mid-object, salvage all fully-formed test cases
          if ! jq empty raw_output.json 2>/dev/null; then
            echo "WARNING: Raw output is not valid JSON — attempting truncation recovery..."
            python3 recover.py
          fi

          TC_COUNT=$(jq '.test_cases | length' raw_output.json)
          if [ "$TC_COUNT" -eq 0 ]; then
            echo "Model returned empty test_cases array"
            cat raw_output.json
            exit 1
          fi

          echo "Generated $TC_COUNT test cases successfully"

      # =========================
      # Coverage gate
      # Fails the run if fewer test cases were generated than expected,
      # acting as a canary for prompt regressions or token truncation.
      # Default minimum is 10; override via the min_test_cases input if needed.
      # =========================
      - name: Coverage gate
        run: |
          set -euo pipefail

          TC_COUNT=$(jq '.test_cases | length' raw_output.json)
          MIN_EXPECTED=10

          echo "Test cases generated : $TC_COUNT"
          echo "Minimum expected     : $MIN_EXPECTED"

          if [ "$TC_COUNT" -lt "$MIN_EXPECTED" ]; then
            echo "::error::Coverage gate failed — only $TC_COUNT test cases generated (minimum: $MIN_EXPECTED). Check prompt or model output."
            exit 1
          fi

          echo "Coverage gate passed"

      # =========================
      # Build CSV & Jira Comment Payload
      # CSV now includes the requirement_source column for traceability.
      # =========================
      - name: Process JSON into CSV and Jira Comment
        shell: python3 {0}
        run: |
          import json
          import csv
          import os

          with open('raw_output.json', 'r', encoding='utf-8') as f:
              data = json.load(f)

          test_cases = data.get('test_cases', [])
          jira_id = "${{ inputs.jira_id }}"

          # 1. Generate CSV — includes Requirement Source for traceability
          csv_file_path = f"Test_Cases_{jira_id}.csv"
          headers = [
              "Test ID", "Requirement ID", "Requirement Source",
              "Test Description", "Test Data", "Expected Result",
              "Actual Result", "Test Status", "Owner"
          ]

          with open(csv_file_path, 'w', newline='', encoding='utf-8') as cf:
              writer = csv.writer(cf)
              writer.writerow(headers)
              for tc in test_cases:
                  idx = str(tc.get('index', '1')).zfill(2)
                  writer.writerow([
                      f"TC_{jira_id}_{idx}",
                      jira_id,
                      tc.get('requirement_source', ''),
                      tc.get('description', ''),
                      tc.get('test_data', ''),
                      tc.get('expected_result', ''),
                      "", "", ""
                  ])

          print(f"CSV written: {csv_file_path} ({len(test_cases)} rows)")

          # 2. ADF helper
          def make_adf_text_content(input_text):
              if not input_text:
                  return [{"type": "text", "text": "N/A"}]
              lines = str(input_text).split('\n')
              nodes = []
              for i, line in enumerate(lines):
                  if line.strip() or i == 0:
                      nodes.append({"type": "text", "text": line})
                  if i < len(lines) - 1:
                      nodes.append({"type": "hardBreak"})
              return nodes if nodes else [{"type": "text", "text": "N/A"}]

          # 3. Build Jira ADF comment table — includes Requirement Source column
          table_rows = [
              {
                  "type": "tableRow",
                  "content": [
                      {"type": "tableHeader", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Test ID",            "marks": [{"type": "strong"}]}]}]},
                      {"type": "tableHeader", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Requirement Source", "marks": [{"type": "strong"}]}]}]},
                      {"type": "tableHeader", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Test Description",   "marks": [{"type": "strong"}]}]}]},
                      {"type": "tableHeader", "content": [{"type": "paragraph", "content": [{"type": "text", "text": "Expected Result",    "marks": [{"type": "strong"}]}]}]}
                  ]
              }
          ]

          for tc in test_cases:
              idx = str(tc.get('index', '1')).zfill(2)
              table_rows.append({
                  "type": "tableRow",
                  "content": [
                      {"type": "tableCell", "content": [{"type": "paragraph", "content": [{"type": "text", "text": f"TC_{jira_id}_{idx}"}]}]},
                      {"type": "tableCell", "content": [{"type": "paragraph", "content": make_adf_text_content(tc.get('requirement_source', ''))}]},
                      {"type": "tableCell", "content": [{"type": "paragraph", "content": make_adf_text_content(tc.get('description', ''))}]},
                      {"type": "tableCell", "content": [{"type": "paragraph", "content": make_adf_text_content(tc.get('expected_result', ''))}]}
                  ]
              })

          comment_payload = {
              "body": {
                  "type": "doc",
                  "version": 1,
                  "content": [
                      {
                          "type": "heading",
                          "attrs": {"level": 3},
                          "content": [{"type": "text", "text": "AI-Generated Test Matrix Summary"}]
                      },
                      {
                          "type": "paragraph",
                          "content": [
                              {"type": "text", "text": f"Generated {len(test_cases)} test cases. Each row is traced to its source requirement. Full tracking file attached."}
                          ]
                      },
                      {
                          "type": "table",
                          "content": table_rows
                      },
                      {
                          "type": "paragraph",
                          "content": [
                              {
                                  "type": "text",
                                  "text": f"Test_Cases_{jira_id}.csv has been attached to this ticket for execution tracking.",
                                  "marks": [{"type": "em"}]
                              }
                          ]
                      }
                  ]
              }
          }

          with open('jira_comment_payload.json', 'w', encoding='utf-8') as jf:
              json.dump(comment_payload, jf, ensure_ascii=False, indent=2)

          print(f"Comment payload written: jira_comment_payload.json")
          print(f"Total test cases processed: {len(test_cases)}")

      # =========================
      # Post Test Case Comment to Jira
      # =========================
      - name: Post table comment to Jira ticket
        run: |
          set -euo pipefail
          echo "Posting test case table to Jira comment section..."

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -X POST \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            --data @jira_comment_payload.json \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}/comment")

          echo "Jira comment POST status: $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -gt 299 ]; then
            echo "Failed to post comment to Jira"
            exit 1
          fi

          echo "Comment posted successfully"

      # =========================
      # Attach CSV to Jira ticket
      # =========================
      - name: Attach CSV to Jira ticket
        run: |
          set -euo pipefail
          CSV_PATH="Test_Cases_${{ inputs.jira_id }}.csv"
          echo "Uploading $CSV_PATH to Jira issue ${{ inputs.jira_id }}..."

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_TOKEN }}" \
            -X POST \
            -H "X-Atlassian-Token: no-check" \
            --form "file=@$CSV_PATH" \
            "${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ inputs.jira_id }}/attachments")

          echo "Jira attachment POST status: $HTTP_CODE"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -gt 299 ]; then
            echo "Failed to attach CSV to Jira"
            exit 1
          fi

          echo "CSV attached successfully"
