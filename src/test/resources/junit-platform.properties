# Path to feature files
cucumber.features=src/test/resources/features/

# Glue code packages
cucumber.glue=stepdefinitions,hooks

# Tags to run
cucumber.filter.tags=@e2e

# Reporting plugins
cucumber.plugin=pretty,html:target/cucumber-reports/report.html,json:target/cucumber-reports/cucumber.json,junit:target/cucumber-reports/Cucumber.xml,rerun:target/failed_scenarios.txt

cucumber.execution.parallel.enabled=true
cucumber.execution.parallel.config.strategy=fixed
cucumber.execution.parallel.config.fixed.parallelism=2

junit.jupiter.execution.parallel.enabled = true
junit.jupiter.execution.parallel.mode.default = concurrent
junit.jupiter.execution.parallel.mode.classes.default = concurrent

